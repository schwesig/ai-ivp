# Default values for cloudnative-pg
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.
policy_namespace: open-cluster-policies
cloudnativePg:
  name: cloudnative-pg
  namespace: openshift-operators
  channel: stable-v1
  source: certified-operators
  sourceNamespace: openshift-marketplace
  operatorGroupName: cloudnative-pg-operator-group
  # targetNamespaces: # Optional: specify target namespaces for namespace-scoped operators
  #   - openshift-operators
  
