### AutoShift Labels Documentation
# The following labels can be set at the cluster or clusterset level to configure this policy:
#
# Enable/Disable:
# cloudnative-pg<bool>: 'true' or 'false' - Controls whether cloudnative-pg is managed
#
# Configuration:
# cloudnative-pg-subscription-name<string>: Operator subscription name (default: 'cloudnative-pg')
# cloudnative-pg-channel<string>: Operator channel (default: 'stable-v1')
# cloudnative-pg-version<string>: Specific operator version (CSV) to install (optional)
# cloudnative-pg-source<string>: Operator catalog source (default: 'certified-operators')
# cloudnative-pg-source-namespace<string>: Catalog namespace (default: 'openshift-marketplace')
#
# Examples:
# autoshift.io/cloudnative-pg: 'true'
# autoshift.io/cloudnative-pg-subscription-name: 'cloudnative-pg'
# autoshift.io/cloudnative-pg-channel: 'stable-v1'
# autoshift.io/cloudnative-pg-version: 'operator-name.v1.x.x'
# autoshift.io/cloudnative-pg-source: 'certified-operators'
# autoshift.io/cloudnative-pg-source-namespace: 'openshift-marketplace'