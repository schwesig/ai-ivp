# Default values for gitlab-runner
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.
policy_namespace: open-cluster-policies
gitlabRunner:
  name: gitlab-runner-operator
  namespace: gitlab-runner-system
  channel: stable
  source: redhat-operators
  sourceNamespace: openshift-marketplace
  operatorGroupName: gitlab-runner-operator-group
  # targetNamespaces: # Optional: specify target namespaces for namespace-scoped operators
  #   - gitlab-runner-system
  
# hubClusterSets:
#   hub:
#     labels:
#       test1: 'test'
# managedClusterSets:
#   managed:
#     labels:
#       test4: 'test'

### AutoShift Labels Documentation
# The following labels can be set at the cluster or clusterset level to configure this policy:
#
# Enable/Disable:
# gitlab-runner<bool>: 'true' or 'false' - Controls whether gitlab-runner is managed
#
# Configuration:
# gitlab-runner-subscription-name<string>: Operator subscription name (default: 'gitlab-runner-operator')
# gitlab-runner-channel<string>: Operator channel (default: 'stable')
# gitlab-runner-version<string>: Specific operator version (CSV) to install (optional)
# gitlab-runner-source<string>: Operator catalog source (default: 'redhat-operators')
# gitlab-runner-source-namespace<string>: Catalog namespace (default: 'openshift-marketplace')
#
# Examples:
# autoshift.io/gitlab-runner: 'true'
# autoshift.io/gitlab-runner-subscription-name: 'gitlab-runner-operator'
# autoshift.io/gitlab-runner-channel: 'stable'
# autoshift.io/gitlab-runner-version: 'operator-name.v1.x.x'
# autoshift.io/gitlab-runner-source: 'redhat-operators'
# autoshift.io/gitlab-runner-source-namespace: 'openshift-marketplace'