# Default values for master-nodes.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.
policy_namespace: open-cluster-policies

masterNodes:
    maxPods: 250
    systemReservedMemory: 3Gi
    systemReservedCpu: 500m
    kubeReservedMemory: 1536Mi
    kubeReservedCpu: 500m
    evictionMemory: 500Mi

### AutoShift Labels Documentation
# The following labels can be set at the cluster or clusterset level to configure this policy:
#
# Enable/Disable:
# master-nodes<bool>: 'true' or 'false' - Enable master node kubelet configuration (default: 'false')
#
# Configuration:
# master-max-pods<Int>: Maximum pods per master node (default: 250, supported up to 2500)
# master-system-reserved-memory<String>: Memory reserved for OS/system processes including etcd (default: '3Gi')
# master-system-reserved-cpu<String>: CPU reserved for OS/system processes (default: '500m')
# master-kube-reserved-memory<String>: Memory reserved for kubelet/CRI-O (default: '1536Mi')
# master-kube-reserved-cpu<String>: CPU reserved for kubelet/CRI-O (default: '500m')
# master-eviction-memory<String>: Hard eviction threshold for memory.available (default: '500Mi')
#
# Note: Allocatable = Capacity - systemReserved - kubeReserved - evictionHard
# Master reservations are higher to protect etcd and control plane components.
#
# Examples:
# autoshift.io/master-nodes: 'true'
# autoshift.io/master-max-pods: '250'
# autoshift.io/master-system-reserved-memory: '3Gi'
# autoshift.io/master-system-reserved-cpu: '500m'
# autoshift.io/master-kube-reserved-memory: '1536Mi'
# autoshift.io/master-kube-reserved-cpu: '500m'
# autoshift.io/master-eviction-memory: '500Mi'
