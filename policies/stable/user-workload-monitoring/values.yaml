### AutoShift Labels Documentation
# The following label enables/disables this policy via Placement:
#
# autoshift.io/uwm: 'true'   # Enable User Workload Monitoring
#
### Config Section (defined under config.uwm in clusterset/cluster values)
#
# All UWM settings are defined in the config section, NOT as labels.
# Config flows through rendered-config ConfigMaps and is read via hub template lookup.
#
#   config:
#     uwm:
#       storageClass: 'gp3-csi'              # Default storage class for all UWM components
#       prometheus:
#         retention: '24h'                    # Prometheus retention time
#         storage: '50Gi'                     # Prometheus PVC size
#         storageClass: 'gp3-csi'            # Override storage class for Prometheus only
#         dedicatedServiceMonitors: true      # Offload service monitor processing (OCP 4.14+)
#         resources:                          # Optional resource limits
#           requests:
#             cpu: '200m'
#             memory: '1Gi'
#           limits:
#             cpu: '1'
#             memory: '4Gi'
#       thanosRuler:
#         retention: '24h'                    # Thanos Ruler retention time
#         storage: '10Gi'                     # Thanos Ruler PVC size
#         storageClass: 'gp3-csi'            # Override storage class for Thanos only
#         resources:                          # Optional resource limits
#           requests:
#             cpu: '100m'
#             memory: '256Mi'
#           limits:
#             cpu: '500m'
#             memory: '1Gi'
#       alertmanager:
#         enabled: true                       # Enable dedicated UWM alertmanager
#         storage: '10Gi'                     # Alertmanager PVC size
#         storageClass: 'gp3-csi'            # Override storage class for Alertmanager only
#         resources:                          # Optional resource limits
#           requests:
#             cpu: '100m'
#             memory: '256Mi'
