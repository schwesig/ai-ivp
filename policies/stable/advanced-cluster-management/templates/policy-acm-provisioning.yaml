
apiVersion: policy.open-cluster-management.io/v1
kind: Policy
metadata:
  name: policy-acm-provisioning
  namespace: {{ .Values.policy_namespace }}
  annotations:
    policy.open-cluster-management.io/standards: NIST SP 800-53
    policy.open-cluster-management.io/categories: CM Configuration Management
    policy.open-cluster-management.io/controls: CM-2 Baseline Configuration
spec:
{{ if (($.Values.autoshift).dryRun) }}
  remediationAction: inform
{{ end }}
  disabled: false
  hubTemplateOptions:
    serviceAccountName: autoshift-policy-service-account
  dependencies:
    - name: policy-acm-mch-install
      namespace: {{ .Values.policy_namespace }}
      apiVersion: policy.open-cluster-management.io/v1
      compliance: Compliant
      kind: Policy
  policy-templates:
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: acm-provisioner
        spec:
          remediationAction: enforce
          severity: high
          evaluationInterval:
            compliant: {{ ((($.Values.autoshift).evaluationInterval).compliant) | default "10m" }}
            noncompliant: {{ ((($.Values.autoshift).evaluationInterval).noncompliant) | default "30s" }}
          object-templates:
            - complianceType: musthave
              objectDefinition:
                apiVersion: metal3.io/v1alpha1
                kind: Provisioning
                metadata:
                  name: provisioning-configuration
                spec:
                  provisioningNetwork: "Disabled"
                  watchAllNamespaces: true
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: acm-agentserviceconfig
        spec:
          remediationAction: enforce
          severity: high
          evaluationInterval:
            compliant: {{ ((($.Values.autoshift).evaluationInterval).compliant) | default "10m" }}
            noncompliant: {{ ((($.Values.autoshift).evaluationInterval).noncompliant) | default "30s" }}
          object-templates-raw: |
            {{ "{{hub" }} $policyNs := "{{ .Values.policy_namespace }}" {{ "hub}}" }}
            {{ "{{hub-" }} $rcm := (lookup "v1" "ConfigMap" $policyNs (printf "%s.rendered-config" .ManagedClusterName)) | default dict {{ "hub}}" }}
            {{ "{{hub-" }} $rcData := (index $rcm "data" | default dict) {{ "hub}}" }}
            {{ "{{hub-" }} $rcConfig := (index $rcData "config" | default "" | fromYaml | default dict) {{ "hub}}" }}
            {{ "{{hub-" }} $disconnected := (index $rcConfig "disconnected" | default dict) {{ "hub}}" }}
            {{ "{{hub-" }} $mirror := (index $disconnected "mirrorRegistry" | default dict) {{ "hub}}" }}
            {{ "{{hub-" }} $mirrorHost := (index $mirror "host" | default "") {{ "hub}}" }}
            {{ "{{hub-" }} $mirrorPath := (index $mirror "path" | default "") {{ "hub}}" }}
            {{ "{{hub-" }} $mirrorUrl := $mirrorHost {{ "hub}}" }}
            {{ "{{hub-" }} if $mirrorPath {{ "hub}}" }}
            {{ "{{hub-" }} $mirrorUrl = (printf "%s/%s" $mirrorHost $mirrorPath) {{ "hub}}" }}
            {{ "{{hub-" }} end {{ "hub}}" }}
            {{ "{{hub-" }} $mirrors := (index $mirror "mirrors" | default list) {{ "hub}}" }}
            {{ "{{hub-" }} $mirrorCa := (index $mirror "ca" | default "") {{ "hub}}" }}
            {{ "{{hub-" }} $caRef := (index $mirror "caRef" | default dict) {{ "hub}}" }}
            {{ "{{hub-" }} if not (empty $caRef) {{ "hub}}" }}
            {{ "{{hub-" }} $refNs := (index $caRef "namespace" | default $policyNs) {{ "hub}}" }}
            {{ "{{hub-" }} $refCM := (lookup "v1" "ConfigMap" $refNs (index $caRef "name")) | default dict {{ "hub}}" }}
            {{ "{{hub-" }} $refData := (index $refCM "data" | default dict) {{ "hub}}" }}
            {{ "{{hub-" }} $mirrorCa = (index $refData (index $caRef "key") | default $mirrorCa) {{ "hub}}" }}
            {{ "{{hub-" }} end {{ "hub}}" }}
            {{ "{{hub-" }} if (gt (len $mirrors) 0) {{ "hub}}" }}
            - complianceType: musthave
              objectDefinition:
                apiVersion: v1
                kind: ConfigMap
                metadata:
                  name: mirror-registry-config
                  namespace: multicluster-engine
                data:
                  registries.conf: |
                    unqualified-search-registries = ["registry.access.redhat.com", "docker.io"]
                    {{ "{{hub-" }} range $_, $entry := $mirrors {{ "hub}}" }}
                    {{ "{{hub-" }} $source := (index $entry "source") {{ "hub}}" }}
                    {{ "{{hub-" }} $mirrorLoc := (index $entry "mirror" | default "") {{ "hub}}" }}
                    {{ "{{hub-" }} if $mirrorLoc {{ "hub}}" }}
                    {{ "{{hub-" }} $mirrorLoc = (printf "%s/%s" $mirrorHost $mirrorLoc) {{ "hub}}" }}
                    {{ "{{hub-" }} else {{ "hub}}" }}
                    {{ "{{hub-" }} $mirrorLoc = $mirrorUrl {{ "hub}}" }}
                    {{ "{{hub-" }} end {{ "hub}}" }}
                    [[registry]]
                      prefix = ""
                      location = "{{ "{{hub" }} $source {{ "hub}}" }}"
                      mirror-by-digest-only = true
                      [[registry.mirror]]
                        location = "{{ "{{hub" }} $mirrorLoc {{ "hub}}" }}"
                    {{ "{{hub-" }} end {{ "hub}}" }}
                  ca-bundle.crt: |
                    {{ "{{hub" }} $mirrorCa | autoindent {{ "hub}}" }}
            {{ "{{hub-" }} end {{ "hub}}" }}
            - complianceType: musthave
              objectDefinition:
                apiVersion: agent-install.openshift.io/v1beta1
                kind: AgentServiceConfig
                metadata:
                  name: agent
                spec:
                  {{ "{{hub-" }} if (gt (len $mirrors) 0) {{ "hub}}" }}
                  mirrorRegistryRef:
                    name: mirror-registry-config
                  {{ "{{hub-" }} end {{ "hub}}" }}
                  databaseStorage:
                    {{ "{{hub-" }} if (index .ManagedClusterLabels "autoshift.io/acm-provisioning-storage-class") {{ "hub}}" }}
                    storageClassName: {{ "{{hub" }} index .ManagedClusterLabels "autoshift.io/acm-provisioning-storage-class" {{ "hub}}" }}
                    {{ "{{hub- end hub}}" }}
                    accessModes:
                    - ReadWriteOnce
                    resources:
                      requests:
                        storage: {{ "{{hub" }} index .ManagedClusterLabels "autoshift.io/acm-provisioning-database-size" | default "{{ .Values.acm.provisioning.database_size }}" {{ "hub}}" }}
                  filesystemStorage:
                    {{ "{{hub-" }} if (index .ManagedClusterLabels "autoshift.io/acm-provisioning-storage-class") {{ "hub}}" }}
                    storageClassName: {{ "{{hub" }} index .ManagedClusterLabels "autoshift.io/acm-provisioning-storage-class" {{ "hub}}" }}
                    {{ "{{hub- end hub}}" }}
                    accessModes:
                    - ReadWriteOnce
                    resources:
                      requests:
                        storage: {{ "{{hub" }} index .ManagedClusterLabels "autoshift.io/acm-provisioning-filesystem-storage-size" | default "{{ .Values.acm.provisioning.filesystem_storage_size }}" {{ "hub}}" }}
                  imageStorage:
                    {{ "{{hub-" }} if (index .ManagedClusterLabels "autoshift.io/acm-provisioning-storage-class") {{ "hub}}" }}
                    storageClassName: {{ "{{hub" }} index .ManagedClusterLabels "autoshift.io/acm-provisioning-storage-class" {{ "hub}}" }}
                    {{ "{{hub- end hub}}" }}
                    accessModes:
                    - ReadWriteOnce
                    resources:
                      requests:
                        storage: {{ "{{hub" }} index .ManagedClusterLabels "autoshift.io/acm-provisioning-image-storage-size" | default "{{ .Values.acm.provisioning.image_storage_size }}" {{ "hub}}" }}
                  {{ "{{hub-" }} $osImages := (index $disconnected "osImages" | default list) {{ "hub}}" }}
                  {{ "{{hub-" }} if (gt (len $osImages) 0) {{ "hub}}" }}
                  osImages:
                  {{ "{{hub-" }} range $_, $img := $osImages {{ "hub}}" }}
                    - openshiftVersion: '{{ "{{hub" }} index $img "openshiftVersion" {{ "hub}}" }}'
                      version: '{{ "{{hub" }} index $img "version" {{ "hub}}" }}'
                      cpuArchitecture: '{{ "{{hub" }} index $img "cpuArchitecture" | default "x86_64" {{ "hub}}" }}'
                      url: '{{ "{{hub" }} index $img "url" {{ "hub}}" }}'
                  {{ "{{hub-" }} if (index $img "rootFSUrl") {{ "hub}}" }}
                      rootFSUrl: '{{ "{{hub" }} index $img "rootFSUrl" {{ "hub}}" }}'
                  {{ "{{hub-" }} end {{ "hub}}" }}
                  {{ "{{hub-" }} end {{ "hub}}" }}
                  {{ "{{hub-" }} end {{ "hub}}" }}
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: acm-agentserviceconfig-test
        spec:
          remediationAction: inform
          severity: high
          evaluationInterval:
            compliant: {{ ((($.Values.autoshift).evaluationInterval).compliant) | default "10m" }}
            noncompliant: {{ ((($.Values.autoshift).evaluationInterval).noncompliant) | default "30s" }}
          object-templates:
            - complianceType: musthave
              objectDefinition:
                apiVersion: agent-install.openshift.io/v1beta1
                kind: AgentServiceConfig
                metadata:
                  name: agent
                status:
                  conditions:
                    - message: AgentServiceConfig reconcile completed without error.
                      reason: ReconcileSucceeded
                      status: 'True'
                      type: ReconcileCompleted
                    - message: All the deployments managed by Infrastructure-operator are healthy.
                      reason: DeploymentSucceeded
                      status: 'True'
                      type: DeploymentsHealthy
            - complianceType: musthave
              objectDefinition:
                kind: Pod
                apiVersion: v1
                metadata:
                  namespace: multicluster-engine
                  labels:
                    app: assisted-image-service
                    statefulset.kubernetes.io/pod-name: assisted-image-service-0
                status:
                  containerStatuses:
                    - started: true
                      ready: true
                      name: assisted-image-service
                  conditions:
                    - type: PodReadyToStartContainers
                      status: 'True'
                    - type: Initialized
                      status: 'True'
                    - type: Ready
                      status: 'True'
                    - type: ContainersReady
                      status: 'True'
                  phase: Running
---
apiVersion: cluster.open-cluster-management.io/v1beta1
kind: Placement
metadata:
  name: placement-acm-provisioning
  namespace: {{ .Values.policy_namespace }}
spec:
  clusterSets:
  {{- range $clusterSet, $value := $.Values.hubClusterSets }}
    - {{ $clusterSet }}
  {{- end }}
  predicates:
    - requiredClusterSelector:
        labelSelector:
          matchExpressions:
            - key: 'autoshift.io/acm-enable-provisioning'
              operator: In
              values:
              - 'true'
---
apiVersion: policy.open-cluster-management.io/v1
kind: PlacementBinding
metadata:
  name: placement-acm-provisioning
  namespace: {{ .Values.policy_namespace }}
placementRef:
  name: placement-acm-provisioning
  apiGroup: cluster.open-cluster-management.io
  kind: Placement
subjects:
  - name: policy-acm-provisioning
    apiGroup: policy.open-cluster-management.io
    kind: Policy
