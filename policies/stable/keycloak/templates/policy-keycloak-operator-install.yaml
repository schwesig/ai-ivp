# components/keycloak-operator/templates/keycloak-operator.yaml
apiVersion: v1
kind: Namespace
metadata:
  name: keycloak-operator
  labels:
    # Standard AutoShift/GitOps tracking labels if required by your framework instance
    autoshift.io/component: keycloak-operator
---
apiVersion: operators.coreos.com/v1
kind: OperatorGroup
metadata:
  name: keycloak-operator-group
  namespace: keycloak-operator
spec:
  targetNamespaces:
  - keycloak-operator
---
apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: keycloak-operator
  namespace: keycloak-operator
spec:
  # The community Keycloak operator or 'rhsso-operator' depending on your cluster's catalog
  name: keycloak-operator 
  channel: stable
  source: redhat-operators # swap to 'redhat-operators' if using official RHSSO/Keycloak product builds
  sourceNamespace: openshift-marketplace
  installPlanApproval: Automatic