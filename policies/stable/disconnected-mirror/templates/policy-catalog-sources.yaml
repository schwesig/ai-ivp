# Policy to configure CatalogSources for mirrored operator catalogs
# Reads catalog config from rendered-config ConfigMaps via hub template lookup
{{- $policyNamespace := $.Values.policy_namespace }}
apiVersion: policy.open-cluster-management.io/v1
kind: Policy
metadata:
  name: policy-disconnected-catalog-sources
  namespace: {{ $policyNamespace }}
  annotations:
    policy.open-cluster-management.io/standards: NIST SP 800-53
    policy.open-cluster-management.io/categories: CM Configuration Management
    policy.open-cluster-management.io/controls: CM-2 Baseline Configuration
spec:
{{ if (($.Values.autoshift).dryRun) }}
  remediationAction: inform
{{ end }}
  disabled: false
  hubTemplateOptions:
    serviceAccountName: autoshift-policy-service-account
  policy-templates:
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: disconnected-catalog-sources
        spec:
          remediationAction: enforce
          severity: high
          evaluationInterval:
            compliant: {{ ((($.Values.autoshift).evaluationInterval).compliant) | default "10m" }}
            noncompliant: {{ ((($.Values.autoshift).evaluationInterval).noncompliant) | default "30s" }}
          object-templates-raw: |
            {{ "{{hub" }} $cm := (lookup "v1" "ConfigMap" "{{ $policyNamespace }}" (printf "%s.rendered-config" .ManagedClusterName)) | default dict {{ "hub}}" }}
            {{ "{{hub" }} $config := (index $cm "data" | default dict) {{ "hub}}" }}
            {{ "{{hub" }} $configYaml := (index $config "config" | default "" | fromYaml | default dict) {{ "hub}}" }}
            {{ "{{hub" }} $disconnected := (index $configYaml "disconnected" | default dict) {{ "hub}}" }}
            {{ "{{hub" }} $mirror := (index $disconnected "mirrorRegistry" | default dict) {{ "hub}}" }}
            {{ "{{hub" }} $mirrorHost := (index $mirror "host") {{ "hub}}" }}
            {{ "{{hub" }} $mirrorPath := (index $mirror "path" | default "") {{ "hub}}" }}
            {{ "{{hub" }} $url := $mirrorHost {{ "hub}}" }}
            {{ "{{hub" }} if $mirrorPath {{ "hub}}" }}
            {{ "{{hub" }} $url = (printf "%s/%s" $mirrorHost $mirrorPath) {{ "hub}}" }}
            {{ "{{hub" }} end {{ "hub}}" }}
            {{ "{{hub" }} $suffix := (index .ManagedClusterLabels "autoshift.io/mirror-catalog-suffix" | default "mirror") {{ "hub}}" }}
            {{ "{{hub" }} $catalogs := (index $disconnected "catalogs") {{ "hub}}" }}
            {{ "{{hub" }} range $_, $catalog := $catalogs {{ "hub}}" }}
            {{ "{{hub" }} $catName := (printf "%s-%s" (index $catalog "source") $suffix) {{ "hub}}" }}
            - complianceType: musthave
              objectDefinition:
                apiVersion: operators.coreos.com/v1alpha1
                kind: CatalogSource
                metadata:
                  name: {{ "{{hub" }} $catName {{ "hub}}" }}
                  namespace: openshift-marketplace
                spec:
                  sourceType: grpc
                  image: '{{ "{{hub" }} printf "%s/%s:%s" $url (index $catalog "imagePath") (index $catalog "tag") {{ "hub}}" }}'
                  displayName: {{ "{{hub" }} index $catalog "displayName" | default $catName {{ "hub}}" }}
                  publisher: {{ "{{hub" }} index $catalog "publisher" | default "AutoShift" {{ "hub}}" }}
                  updateStrategy:
                    registryPoll:
                      interval: {{ "{{hub" }} index $catalog "updateInterval" | default "10m" {{ "hub}}" }}
            {{ "{{hub" }} end {{ "hub}}" }}
---
apiVersion: cluster.open-cluster-management.io/v1beta1
kind: Placement
metadata:
  name: placement-policy-disconnected-catalog-sources
  namespace: {{ $policyNamespace }}
spec:
  clusterSets:
  {{- range $clusterSet, $value := .Values.managedClusterSets }}
    - {{ $clusterSet }}
  {{- end }}
  {{- range $clusterSet, $value := .Values.hubClusterSets }}
    - {{ $clusterSet }}
  {{- end }}
  predicates:
    - requiredClusterSelector:
        labelSelector:
          matchExpressions:
            - key: 'autoshift.io/disconnected-mirror'
              operator: In
              values:
              - 'true'
  tolerations:
    - key: cluster.open-cluster-management.io/unreachable
      operator: Exists
    - key: cluster.open-cluster-management.io/unavailable
      operator: Exists
---
apiVersion: policy.open-cluster-management.io/v1
kind: PlacementBinding
metadata:
  name: placement-policy-disconnected-catalog-sources
  namespace: {{ $policyNamespace }}
placementRef:
  name: placement-policy-disconnected-catalog-sources
  apiGroup: cluster.open-cluster-management.io
  kind: Placement
subjects:
  - name: policy-disconnected-catalog-sources
    apiGroup: policy.open-cluster-management.io
    kind: Policy
