# Default values for disconnected-mirror policy
# This policy reads disconnected mirror configuration from rendered-config ConfigMaps
# created by the cluster-config-maps policy.
#
# Configuration is defined in cluster/clusterset values files under config.disconnected:
#
#   config:
#     disconnected:
#       mirrorRegistry:
#         host: 'mirror.example.com:5000'
#         path: 'ocp'
#         releaseImage: 'openshift/ocp-release' # optional, defaults to openshift-release-dev/ocp-release
#         mirrors:
#           - source: quay.io/openshift-release-dev/ocp-release
#             mirror: openshift/release-images
#           - source: registry.redhat.io   # no mirror = host/path/source
#         ca: |                                    # inline CA bundle
#           -----BEGIN CERTIFICATE-----
#           ...
#         caRef:                                   # OR reference a hub ConfigMap
#           name: 'cluster-ca-bundle'
#           key: 'ca-bundle.crt'
#           namespace: 'cluster-install-secrets'
#       useIDMS: true                              # IDMS (OCP 4.13+) or ICSP (4.12-)
#       disableDefaultCatalogs: true               # disable default OperatorHub catalogs
#       catalogs:                                  # CatalogSource name = {source}-{mirror-catalog-suffix label}
#         - source: redhat-operators               # creates CatalogSource "redhat-operators-mirror"
#           imagePath: redhat/redhat-operator-index
#           tag: v4.20
#           publisher: Red Hat
#           updateInterval: 10m
#
# Placement:
#   Clusters must have the label autoshift.io/disconnected-mirror: 'true' to receive
#   these policies. Set this label in your clusterset or cluster values file.
#
# How it works:
#   1. Config defined in values files flows through rendered-config ConfigMaps
#   2. Policies use hub template lookup to read the per-cluster rendered-config
#   3. IDMS/ICSP redirects image pulls from source registries to mirror
#   4. CatalogSources point to mirrored operator catalogs
#   5. OperatorHub default sources disabled (if disableDefaultCatalogs: true)
#
#   osImages:                                      # RHCOS images for hub AgentServiceConfig
#     - openshiftVersion: '4.20'
#       version: '420.86.202301311551-0'
#       cpuArchitecture: x86_64
#       url: 'https://mirror.example.com/rhcos/rhcos-live.x86_64.iso'
#
# The same disconnected config is shared with:
#   - cluster-install policy: mirrorRegistryRef, InfraEnv CA, ClusterImageSet releaseImage
#   - ACM provisioning policy: AgentServiceConfig mirrorRegistryRef + osImages

# Standard autoshift values (injected by ApplicationSet)
policy_namespace: open-cluster-policies
autoshift:
  evaluationInterval:
    compliant: 10m
    noncompliant: 30s
  dryRun: false
