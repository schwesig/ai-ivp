---
# ConfigMap for image-registry-storage bucket credentials (used by image-registry policy)
apiVersion: v1
kind: ConfigMap
metadata:
  name: image-registry-storage
  namespace: openshift-image-registry
data:
  BUCKET_NAME: image-registry-bucket
  BUCKET_HOST: s3.us-east-2.amazonaws.com
  BUCKET_PORT: "443"
