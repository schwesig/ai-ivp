      acs-scanner-v4: Enabled               # Scanner V4 component state ('Enabled' or 'Disabled')
      acs-monitoring: 'true'                 # Enable OpenShift monitoring integration
      acs-auth-provider: openshift           # Auth provider type ('openshift')
      acs-auth-min-role: None                # Minimum role for authenticated users
      acs-auth-admin-group: cluster-admins   # Group mapped to Admin role
      acs-vm-scanning: 'true'               # Enable VM scanning (Developer Preview)
      acs-admission-control: 'true'         # Enable admission control enforcement
      acs-network-policies: Enabled         # Network policy generation ('Enabled' or 'Disabled')
      acs-default-policies: 'true'          # Deploy baseline SecurityPolicy CRDs

