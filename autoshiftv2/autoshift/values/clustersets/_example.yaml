      gitlab-channel: stable
      gitlab-version: 'gitlab-operator-kubernetes.v1.5.1'
      gitlab-source: certified-operators
      gitlab-source-namespace: openshift-marketplace
      # Service modes: managed (default), external, or bundled
      gitlab-db-mode: 'managed'                 # managed: CNPG HA, external: BYO, bundled: built-in
      gitlab-redis-mode: 'managed'              # managed: Redis Sentinel, external: BYO, bundled: Bitnami
      gitlab-object-storage-mode: 'managed'     # managed: NooBaa, external: BYO S3, bundled: MinIO
      # External mode labels (only when mode is 'external'):
      gitlab-db-host: 'my-postgres.example.com'
      gitlab-redis-host: 'my-redis.example.com'
      gitlab-redis-port: '6379'
      gitlab-argocd-integration: 'true'         # Create ArgoCD credential template for all GitLab repos
      gitlab-gitaly-ha: 'true'                  # Enable Gitaly HA via Praefect (default: false)
      gitlab-praefect-replicas: '3'             # Praefect proxy replicas (default: 3)
      gitlab-gitaly-replicas: '3'               # Gitaly replicas per virtual storage (default: 3)
      gitlab-gitaly-storage-class: 'ocs-storagecluster-cephfs'  # StorageClass for Gitaly PVC (omit for cluster default; use RWX for multi-node)
      gitlab-redis-storage-class: 'ocs-storagecluster-cephfs'   # StorageClass for bundled Redis PVC (omit for cluster default)
      gitlab-db-instances: '2'                  # PostgreSQL replicas (default: 2)
      gitlab-db-pooler-instances: '2'           # PgBouncer replicas (default: 2)
      gitlab-db-backups: 'true'                 # Enable CNPG backups (requires managed db + odf)
      gitlab-webservice-min-replicas: '2'       # Webservice HPA min (default: 2)
      gitlab-webservice-max-replicas: '4'       # Webservice HPA max (default: 4)
      gitlab-sidekiq-min-replicas: '2'          # Sidekiq HPA min (default: 2)
      gitlab-sidekiq-max-replicas: '4'          # Sidekiq HPA max (default: 4)
      gitlab-shell-min-replicas: '2'            # gitlab-shell HPA min (default: 2)
      gitlab-shell-max-replicas: '4'            # gitlab-shell HPA max (default: 4)
      # --- Config values go in config.gitlab (see config section above) ---
