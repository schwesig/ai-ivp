#     labels:
#       test1: 'test'
# managedClusterSets:
#   managed:
#     labels:
#       test4: 'test'

### AutoShift Labels Documentation
# The following labels can be set at the cluster or clusterset level to configure this policy:
#
# Enable/Disable:
# jfrog<bool>: 'true' or 'false' - Controls whether jfrog is managed
#
# Configuration:
# jfrog-subscription-name<string>: Operator subscription name (default: 'openshiftartifactoryha-operator')
# jfrog-channel<string>: Operator channel (default: 'stable')
# jfrog-version<string>: Specific operator version (CSV) to install (optional)
# jfrog-source<string>: Operator catalog source (default: 'certified-operators')
# jfrog-source-namespace<string>: Catalog namespace (default: 'openshift-marketplace')
#
# Database Backups (label):
# artifactory-db-backups<bool>: Enable scheduled CNPG backups to NooBaa (requires cloudnative-pg + odf)
#
# Config (set in hubClusterSets.config.jfrog, NOT labels — values with spaces):
#   dbBackupSchedule: '0 3 * * *'       # Cron schedule for base backups
#   dbBackupRetention: '30d'            # Backup retention period
#
# Label Examples:
# autoshift.io/jfrog: 'true'
# autoshift.io/jfrog-subscription-name: 'openshiftartifactoryha-operator'
# autoshift.io/jfrog-channel: 'stable'
# autoshift.io/artifactory-db-backups: 'true'
#
# Config Example (in clusterset values file):
# hubClusterSets:
#   hub:
#     config:
#       jfrog:
#         dbBackupSchedule: '0 3 * * *'
#         dbBackupRetention: '30d'