### AutoShift Labels Documentation
# The following labels can be set at the cluster or clusterset level to configure this policy:
#
# Enable/Disable:
# servicemesh3operator<bool>: 'true' or 'false' - Controls whether servicemesh3operator is managed
#
# Operator Configuration:
# servicemesh3operator-subscription-name<string>: Operator subscription name (default: 'servicemeshoperator3')
# servicemesh3operator-channel<string>: Operator channel (default: 'stable')
# servicemesh3operator-version<string>: Specific operator version (CSV) to install (optional)
# servicemesh3operator-source<string>: Operator catalog source (default: 'redhat-operators')
# servicemesh3operator-source-namespace<string>: Catalog namespace (default: 'openshift-marketplace')
#
# Examples:
# autoshift.io/servicemesh3operator: 'true'
# autoshift.io/servicemesh3operator-subscription-name: 'servicemeshoperator3'
# autoshift.io/servicemesh3operator-channel: 'stable'
# autoshift.io/servicemesh3operator-version: 'servicemeshoperator3.v3.x.x'
# autoshift.io/servicemesh3operator-source: 'redhat-operators'
# autoshift.io/servicemesh3operator-source-namespace: 'openshift-marketplace'
