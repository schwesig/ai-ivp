# Default values for cert-manager
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.
policy_namespace: open-cluster-policies
certManager:
  name: openshift-cert-manager-operator
  namespace: cert-manager-operator
  channel: stable-v1
  source: redhat-operators
  sourceNamespace: openshift-marketplace
  operatorGroupName: cert-manager-operator-group
  # targetNamespaces: # Optional: specify target namespaces for namespace-scoped operators
  #   - cert-manager-operator
  
# hubClusterSets:
#   hub:
#     labels:
#       test1: 'test'
# managedClusterSets:
#   managed:
#     labels:
#       test4: 'test'

### AutoShift Labels Documentation
# The following labels can be set at the cluster or clusterset level to configure this policy:
#
# Enable/Disable:
# cert-manager<bool>: 'true' or 'false' - Controls whether cert-manager is managed
#
# Configuration:
# cert-manager-subscription-name<string>: Operator subscription name (default: 'openshift-cert-manager-operator')
# cert-manager-channel<string>: Operator channel (default: 'stable-v1')
# cert-manager-version<string>: Specific operator version (CSV) to install (optional)
# cert-manager-source<string>: Operator catalog source (default: 'redhat-operators')
# cert-manager-source-namespace<string>: Catalog namespace (default: 'openshift-marketplace')
#
# Examples:
# autoshift.io/cert-manager: 'true'
# autoshift.io/cert-manager-subscription-name: 'openshift-cert-manager-operator'
# autoshift.io/cert-manager-channel: 'stable-v1'
# autoshift.io/cert-manager-version: 'operator-name.v1.x.x'
# autoshift.io/cert-manager-source: 'redhat-operators'
# autoshift.io/cert-manager-source-namespace: 'openshift-marketplace'