# Default values for opentelemetry
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.
policy_namespace: open-cluster-policies
opentelemetry:
  name: opentelemetry-product
  namespace: openshift-opentelemetry-operator
  channel: stable
  source: redhat-operators
  sourceNamespace: openshift-marketplace
  # targetNamespaces: # Optional: specify target namespaces for namespace-scoped operators
  #   - openshift-opentelemetry-operator
  
# hubClusterSets:
#   hub:
#     labels:
#       test1: 'test'
# managedClusterSets:
#   managed:
#     labels:
#       test4: 'test'

### AutoShift Labels Documentation
# The following labels can be set at the cluster or clusterset level to configure this policy:
#
# Enable/Disable:
# opentelemetry<bool>: 'true' or 'false' - Controls whether opentelemetry is managed
#
# Configuration:
# opentelemetry-subscription-name<string>: Operator subscription name (default: 'opentelemetry-product')
# opentelemetry-channel<string>: Operator channel (default: 'stable')
# opentelemetry-version<string>: Specific operator version (CSV) to install (optional)
# opentelemetry-source<string>: Operator catalog source (default: 'redhat-operators')
# opentelemetry-source-namespace<string>: Catalog namespace (default: 'openshift-marketplace')
#
# Examples:
# autoshift.io/opentelemetry: 'true'
# autoshift.io/opentelemetry-subscription-name: 'opentelemetry-product'
# autoshift.io/opentelemetry-channel: 'stable'
# autoshift.io/opentelemetry-version: 'operator-name.v1.x.x'
# autoshift.io/opentelemetry-source: 'redhat-operators'
# autoshift.io/opentelemetry-source-namespace: 'openshift-marketplace'
