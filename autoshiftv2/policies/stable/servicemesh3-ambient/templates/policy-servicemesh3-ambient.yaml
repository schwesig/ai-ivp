{{- $policyName := "policy-servicemesh3-ambient" }}
{{- $placementName := "placement-policy-servicemesh3-ambient" }}

apiVersion: policy.open-cluster-management.io/v1
kind: Policy
metadata:
  name: {{ $policyName }}
  namespace: {{ .Values.policy_namespace }}
  annotations:
    argocd.argoproj.io/sync-options: Prune=false,SkipDryRunOnMissingResource=true
    argocd.argoproj.io/compare-options: IgnoreExtraneous
    argocd.argoproj.io/sync-wave: "1"
    policy.open-cluster-management.io/standards: NIST SP 800-53
    policy.open-cluster-management.io/categories: CM Configuration Management
    policy.open-cluster-management.io/controls: CM-2 Baseline Configuration
spec:
{{ if (($.Values.autoshift).dryRun) }}
  remediationAction: inform
{{ end }}
  disabled: false
  dependencies:
    - name: policy-servicemesh3-operator-install
      namespace: {{ .Values.policy_namespace }}
      apiVersion: policy.open-cluster-management.io/v1
      compliance: Compliant
      kind: Policy
    - name: policy-kiali-operator-install
      namespace: {{ .Values.policy_namespace }}
      apiVersion: policy.open-cluster-management.io/v1
      compliance: Compliant
      kind: Policy
    - name: policy-tempo-operator-install
      namespace: {{ .Values.policy_namespace }}
      apiVersion: policy.open-cluster-management.io/v1
      compliance: Compliant
      kind: Policy
    - name: policy-opentelemetry-operator-install
      namespace: {{ .Values.policy_namespace }}
      apiVersion: policy.open-cluster-management.io/v1
      compliance: Compliant
      kind: Policy
    - name: policy-storage-cluster-test
      namespace: {{ .Values.policy_namespace }}
      apiVersion: policy.open-cluster-management.io/v1
      compliance: Compliant
      kind: Policy
  policy-templates:
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: servicemesh3-ambient-istio-namespace
        spec:
          remediationAction: enforce
          severity: high
          evaluationInterval:
            compliant: {{ ((($.Values.autoshift).evaluationInterval).compliant) | default "10m" }}
            noncompliant: {{ ((($.Values.autoshift).evaluationInterval).noncompliant) | default "30s" }}
          object-templates:
            - complianceType: musthave
              objectDefinition:
                apiVersion: v1
                kind: Namespace
                metadata:
                  name: {{ .Values.servicemesh3operator.istioNamespace }}
            - complianceType: musthave
              objectDefinition:
                apiVersion: v1
                kind: Namespace
                metadata:
                  name: {{ .Values.servicemesh3operator.istioCNINamespace }}
            - complianceType: musthave
              objectDefinition:
                apiVersion: v1
                kind: Namespace
                metadata:
                  name: {{ .Values.servicemesh3operator.ztunnelNamespace }}
            - complianceType: musthave
              objectDefinition:
                apiVersion: v1
                kind: Namespace
                metadata:
                  name: {{ .Values.servicemesh3operator.tempoNamespace }}
    # IstioCNI — manages the CNI DaemonSet for traffic redirection
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: servicemesh3-ambient-istio-cni
        spec:
          remediationAction: enforce
          severity: high
          evaluationInterval:
            compliant: {{ ((($.Values.autoshift).evaluationInterval).compliant) | default "10m" }}
            noncompliant: {{ ((($.Values.autoshift).evaluationInterval).noncompliant) | default "30s" }}
          object-templates:
            - complianceType: musthave
              objectDefinition:
                apiVersion: sailoperator.io/v1
                kind: IstioCNI
                metadata:
                  name: default
                spec:
                  version: '{{ "{{hub" }} index .ManagedClusterLabels "autoshift.io/servicemesh3operator-istio-version" | default "{{ .Values.servicemesh3operator.istioVersion }}" {{ "hub}}" }}'
                  profile: ambient
                  namespace: {{ .Values.servicemesh3operator.istioCNINamespace }}
    # Istio control plane — manages the mesh via xDS APIs
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: servicemesh3-ambient-istio
        spec:
          remediationAction: enforce
          severity: high
          evaluationInterval:
            compliant: {{ ((($.Values.autoshift).evaluationInterval).compliant) | default "10m" }}
            noncompliant: {{ ((($.Values.autoshift).evaluationInterval).noncompliant) | default "30s" }}
          object-templates:
            - complianceType: musthave
              objectDefinition:
                apiVersion: sailoperator.io/v1
                kind: Istio
                metadata:
                  name: default
                spec:
                  version: '{{ "{{hub" }} index .ManagedClusterLabels "autoshift.io/servicemesh3operator-istio-version" | default "{{ .Values.servicemesh3operator.istioVersion }}" {{ "hub}}" }}'
                  namespace: {{ .Values.servicemesh3operator.istioNamespace }}
                  profile: ambient
                  updateStrategy:
                    type: {{ .Values.servicemesh3operator.updateStrategy }}
                  values:
                    meshConfig:
                      enableTracing: true
                      extensionProviders:
                      - name: otel
                        opentelemetry:
                          port: 4317
                          service: otel-collector.{{ .Values.servicemesh3operator.istioNamespace }}.svc.cluster.local
                    global:
                      platform: openshift
                    pilot:
                      trustedZtunnelNamespace: {{ .Values.servicemesh3operator.ztunnelNamespace }}
                      resources:
                        requests:
                          cpu: {{ .Values.servicemesh3operator.pilot.cpuRequest }}
                          memory: {{ .Values.servicemesh3operator.pilot.memoryRequest }}
    # ZTunnel — per-node L4 proxy DaemonSet for ambient mode
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: servicemesh3-ambient-ztunnel
        spec:
          remediationAction: enforce
          severity: high
          evaluationInterval:
            compliant: {{ ((($.Values.autoshift).evaluationInterval).compliant) | default "10m" }}
            noncompliant: {{ ((($.Values.autoshift).evaluationInterval).noncompliant) | default "30s" }}
          object-templates:
            - complianceType: musthave
              objectDefinition:
                apiVersion: sailoperator.io/v1alpha1
                kind: ZTunnel
                metadata:
                  name: default
                spec:
                  profile: ambient
                  namespace: {{ .Values.servicemesh3operator.ztunnelNamespace }}
    # OpenShift monitoring — Telemetry, istiod ServiceMonitor, ztunnel PodMonitor
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: servicemesh3-ambient-monitoring
        spec:
          remediationAction: enforce
          severity: high
          evaluationInterval:
            compliant: {{ ((($.Values.autoshift).evaluationInterval).compliant) | default "10m" }}
            noncompliant: {{ ((($.Values.autoshift).evaluationInterval).noncompliant) | default "30s" }}
          object-templates:
            - complianceType: musthave
              objectDefinition:
                apiVersion: telemetry.istio.io/v1
                kind: Telemetry
                metadata:
                  name: enable-prometheus-metrics
                  namespace: {{ .Values.servicemesh3operator.istioNamespace }}
                spec:
                  metrics:
                  - providers:
                    - name: prometheus
            - complianceType: musthave
              objectDefinition:
                apiVersion: opentelemetry.io/v1beta1
                kind: OpenTelemetryCollector
                metadata:
                  name: otel
                  namespace: {{ .Values.servicemesh3operator.istioNamespace }}
                spec:
                  mode: deployment
                  observability:
                    metrics: {}
                  deploymentUpdateStrategy: {}
                  config:
                    exporters:
                      otlp:
                        endpoint: 'tempo-servicemesh-distributor.{{ .Values.servicemesh3operator.tempoNamespace }}.svc.cluster.local:4317'
                        tls:
                          insecure: true
                    receivers:
                      otlp:
                        protocols:
                          grpc:
                            endpoint: '0.0.0.0:4317'
                          http: {}
                    service:
                      pipelines:
                        traces:
                          exporters:
                          - otlp
                          receivers:
                          - otlp
            - complianceType: musthave
              objectDefinition:
                apiVersion: monitoring.coreos.com/v1
                kind: ServiceMonitor
                metadata:
                  name: istiod-monitor
                  namespace: {{ .Values.servicemesh3operator.istioNamespace }}
                spec:
                  targetLabels:
                  - app
                  selector:
                    matchLabels:
                      istio: pilot
                  endpoints:
                  - port: http-monitoring
                    interval: 30s
            - complianceType: musthave
              objectDefinition:
                apiVersion: monitoring.coreos.com/v1
                kind: PodMonitor
                metadata:
                  name: istio-ztunnel-monitor
                  namespace: {{ .Values.servicemesh3operator.ztunnelNamespace }}
                spec:
                  selector:
                    matchExpressions:
                    - key: istio-prometheus-ignore
                      operator: DoesNotExist
                  podMetricsEndpoints:
                  - path: /stats/prometheus
                    interval: 30s
                    relabelings:
                    - action: keep
                      sourceLabels: [__meta_kubernetes_pod_container_name]
                      regex: 'istio-proxy'
                    - action: keep
                      sourceLabels: [__meta_kubernetes_pod_annotationpresent_prometheus_io_scrape]
                    - action: replace
                      regex: '(\d+);(([A-Fa-f0-9]{1,4}::?){1,7}[A-Fa-f0-9]{1,4})'
                      replacement: '[$2]:$1'
                      sourceLabels: [__meta_kubernetes_pod_annotation_prometheus_io_port, __meta_kubernetes_pod_ip]
                      targetLabel: __address__
                    - action: replace
                      regex: '(\d+);((([0-9]+?)(\.|$)){4})'
                      replacement: '$2:$1'
                      sourceLabels: [__meta_kubernetes_pod_annotation_prometheus_io_port, __meta_kubernetes_pod_ip]
                      targetLabel: __address__
                    - sourceLabels: [__meta_kubernetes_pod_label_app_kubernetes_io_name, __meta_kubernetes_pod_label_app]
                      separator: ';'
                      targetLabel: app
                      action: replace
                      regex: '(.+);.*|.*;(.+)'
                      replacement: '${1}${2}'
                    - sourceLabels: [__meta_kubernetes_pod_label_app_kubernetes_io_version, __meta_kubernetes_pod_label_version]
                      separator: ';'
                      targetLabel: version
                      action: replace
                      regex: '(.+);.*|.*;(.+)'
                      replacement: '${1}${2}'
                    - sourceLabels: [__meta_kubernetes_namespace]
                      action: replace
                      targetLabel: namespace
                    - action: replace
                      replacement: mesh_id
                      targetLabel: mesh_id
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: servicemesh3-ambient-kiali
        spec:
          remediationAction: enforce
          severity: high
          evaluationInterval:
            compliant: {{ ((($.Values.autoshift).evaluationInterval).compliant) | default "10m" }}
            noncompliant: {{ ((($.Values.autoshift).evaluationInterval).noncompliant) | default "30s" }}
          object-templates-raw: |
            - complianceType: musthave
              objectDefinition:
                apiVersion: kiali.io/v1alpha1
                kind: Kiali
                metadata:
                  name: kiali
                  namespace: {{ .Values.servicemesh3operator.istioNamespace }}
                spec:
                  istio_namespace: {{ .Values.servicemesh3operator.istioNamespace }}
                  auth:
                    strategy: openshift
                  deployment:
                    cluster_wide_access: true
                  external_services:
                    prometheus:
                      auth:
                        type: bearer
                        use_kiali_token: true
                      thanos_proxy:
                        enabled: true
                      url: https://thanos-querier.openshift-monitoring.svc.cluster.local:9091
                  {{ "{{hub" }} if eq (index .ManagedClusterLabels "autoshift.io/servicemesh3operator-tempo" | default "false") "true" {{ "hub}}" }}
                    tracing:
                      enabled: true
                      provider: tempo
                      use_grpc: false
                      internal_url: 'http://tempo-servicemesh-query-frontend.{{ .Values.servicemesh3operator.tempoNamespace }}.svc.cluster.local:3200'
                      tempo_config:
                        url_format: jaeger
                  {{ "{{hub" }} end {{ "hub}}" }}
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: servicemesh3-ambient-kiali-monitoring-rbac
        spec:
          remediationAction: enforce
          severity: high
          evaluationInterval:
            compliant: {{ ((($.Values.autoshift).evaluationInterval).compliant) | default "10m" }}
            noncompliant: {{ ((($.Values.autoshift).evaluationInterval).noncompliant) | default "30s" }}
          object-templates:
            - complianceType: musthave
              objectDefinition:
                apiVersion: rbac.authorization.k8s.io/v1
                kind: ClusterRoleBinding
                metadata:
                  name: kiali-monitoring-rbac
                roleRef:
                  apiGroup: rbac.authorization.k8s.io
                  kind: ClusterRole
                  name: cluster-monitoring-view
                subjects:
                  - kind: ServiceAccount
                    name: kiali-service-account
                    namespace: {{ .Values.servicemesh3operator.istioNamespace }}
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: servicemesh3-ambient-tempo-bucket
        spec:
          remediationAction: enforce
          severity: high
          evaluationInterval:
            compliant: {{ ((($.Values.autoshift).evaluationInterval).compliant) | default "10m" }}
            noncompliant: {{ ((($.Values.autoshift).evaluationInterval).noncompliant) | default "30s" }}
          object-templates:
            - complianceType: musthave
              objectDefinition:
                apiVersion: objectbucket.io/v1alpha1
                kind: ObjectBucketClaim
                metadata:
                  name: tempo-bucket-odf
                  namespace: {{ .Values.servicemesh3operator.tempoNamespace }}
                spec:
                  generateBucketName: tempo-bucket-odf
                  storageClassName: openshift-storage.noobaa.io
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: servicemesh3-ambient-tempo-secret
        spec:
          remediationAction: enforce
          severity: high
          evaluationInterval:
            compliant: {{ ((($.Values.autoshift).evaluationInterval).compliant) | default "10m" }}
            noncompliant: {{ ((($.Values.autoshift).evaluationInterval).noncompliant) | default "30s" }}
          object-templates:
            - complianceType: musthave
              objectDefinition:
                apiVersion: v1
                kind: Secret
                metadata:
                  name: tempo-s3-secret
                  namespace: {{ .Values.servicemesh3operator.tempoNamespace }}
                type: Opaque
                stringData:
                  endpoint: 'https://{{ "{{" }} fromConfigMap "{{ .Values.servicemesh3operator.tempoNamespace }}" "tempo-bucket-odf" "BUCKET_HOST" {{ "}}" }}:{{ "{{" }} fromConfigMap "{{ .Values.servicemesh3operator.tempoNamespace }}" "tempo-bucket-odf" "BUCKET_PORT" {{ "}}" }}'
                  bucket: '{{ "{{" }} fromConfigMap "{{ .Values.servicemesh3operator.tempoNamespace }}" "tempo-bucket-odf" "BUCKET_NAME" {{ "}}" }}'
                  access_key_id: '{{ "{{" }} fromSecret "{{ .Values.servicemesh3operator.tempoNamespace }}" "tempo-bucket-odf" "AWS_ACCESS_KEY_ID" | base64dec {{ "}}" }}'
                  access_key_secret: '{{ "{{" }} fromSecret "{{ .Values.servicemesh3operator.tempoNamespace }}" "tempo-bucket-odf" "AWS_SECRET_ACCESS_KEY" | base64dec {{ "}}" }}'
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: servicemesh3-ambient-tempo-ca-bundle
        spec:
          remediationAction: enforce
          severity: high
          evaluationInterval:
            compliant: {{ ((($.Values.autoshift).evaluationInterval).compliant) | default "10m" }}
            noncompliant: {{ ((($.Values.autoshift).evaluationInterval).noncompliant) | default "30s" }}
          object-templates:
            - complianceType: musthave
              objectDefinition:
                apiVersion: v1
                kind: ConfigMap
                metadata:
                  name: tempo-s3-ca-bundle
                  namespace: {{ .Values.servicemesh3operator.tempoNamespace }}
                  annotations:
                    service.beta.openshift.io/inject-cabundle: "true"
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: servicemesh3-ambient-tempo-stack
        spec:
          remediationAction: enforce
          severity: high
          evaluationInterval:
            compliant: {{ ((($.Values.autoshift).evaluationInterval).compliant) | default "10m" }}
            noncompliant: {{ ((($.Values.autoshift).evaluationInterval).noncompliant) | default "30s" }}
          object-templates:
            - complianceType: musthave
              objectDefinition:
                apiVersion: tempo.grafana.com/v1alpha1
                kind: TempoStack
                metadata:
                  name: tempo-servicemesh
                  namespace: {{ .Values.servicemesh3operator.tempoNamespace }}
                spec:
                  storage:
                    secret:
                      name: tempo-s3-secret
                      type: s3
                    tls:
                      enabled: true
                      caName: tempo-s3-ca-bundle
                  storageSize: {{ .Values.servicemesh3operator.tempo.storageSize }}
                  template:
                    queryFrontend:
                      jaegerQuery:
                        enabled: true
                        ingress:
                          type: route
---
apiVersion: cluster.open-cluster-management.io/v1beta1
kind: Placement
metadata:
  name: {{ $placementName }}
  namespace: {{ .Values.policy_namespace }}
spec:
  clusterSets:
  {{- range $clusterSet, $value := .Values.managedClusterSets }}
    - {{ $clusterSet }}
  {{- end }}
  {{- range $clusterSet, $value := .Values.hubClusterSets }}
    - {{ $clusterSet }}
  {{- end }}
  predicates:
    - requiredClusterSelector:
        labelSelector:
          matchExpressions:
            - key: 'autoshift.io/servicemesh3-ambient'
              operator: In
              values:
              - 'true'
  tolerations:
    - key: cluster.open-cluster-management.io/unreachable
      operator: Exists
    - key: cluster.open-cluster-management.io/unavailable
      operator: Exists
---
apiVersion: policy.open-cluster-management.io/v1
kind: PlacementBinding
metadata:
  name: {{ $placementName }}
  namespace: {{ .Values.policy_namespace }}
placementRef:
  name: {{ $placementName }}
  apiGroup: cluster.open-cluster-management.io
  kind: Placement
subjects:
  - name: {{ $policyName }}
    apiGroup: policy.open-cluster-management.io
    kind: Policy
