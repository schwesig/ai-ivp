# Policy to configure ImageDigestMirrorSet/ICSP and ImageTagMirrorSet for disconnected environments
# Reads mirror registry config from rendered-config ConfigMaps via hub template lookup
{{- $policyNamespace := $.Values.policy_namespace }}
apiVersion: policy.open-cluster-management.io/v1
kind: Policy
metadata:
  name: policy-disconnected-image-mirrors
  namespace: {{ $policyNamespace }}
  annotations:
    policy.open-cluster-management.io/standards: NIST SP 800-53
    policy.open-cluster-management.io/categories: CM Configuration Management
    policy.open-cluster-management.io/controls: CM-2 Baseline Configuration
spec:
{{ if (($.Values.autoshift).dryRun) }}
  remediationAction: inform
{{ end }}
  disabled: false
  hubTemplateOptions:
    serviceAccountName: autoshift-policy-service-account
  policy-templates:
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: disconnected-image-mirrors
        spec:
          remediationAction: enforce
          severity: high
          evaluationInterval:
            compliant: {{ ((($.Values.autoshift).evaluationInterval).compliant) | default "10m" }}
            noncompliant: {{ ((($.Values.autoshift).evaluationInterval).noncompliant) | default "30s" }}
          object-templates-raw: |
            {{ "{{hub" }} $cm := (lookup "v1" "ConfigMap" "{{ $policyNamespace }}" (printf "%s.rendered-config" .ManagedClusterName)) | default dict {{ "hub}}" }}
            {{ "{{hub" }} $config := (index $cm "data" | default dict) {{ "hub}}" }}
            {{ "{{hub" }} $configYaml := (index $config "config" | default "" | fromYaml | default dict) {{ "hub}}" }}
            {{ "{{hub" }} $disconnected := (index $configYaml "disconnected" | default dict) {{ "hub}}" }}
            {{ "{{hub" }} $mirror := (index $disconnected "mirrorRegistry" | default dict) {{ "hub}}" }}
            {{ "{{hub" }} $mirrorHost := (index $mirror "host") {{ "hub}}" }}
            {{ "{{hub" }} $mirrorPath := (index $mirror "path" | default "") {{ "hub}}" }}
            {{ "{{hub" }} $url := $mirrorHost {{ "hub}}" }}
            {{ "{{hub" }} if $mirrorPath {{ "hub}}" }}
            {{ "{{hub" }} $url = (printf "%s/%s" $mirrorHost $mirrorPath) {{ "hub}}" }}
            {{ "{{hub" }} end {{ "hub}}" }}
            {{ "{{hub" }} $mirrors := (index $mirror "mirrors") {{ "hub}}" }}
            {{ "{{hub" }} $useIDMS := (index $disconnected "useIDMS" | default true) {{ "hub}}" }}
            {{ "{{hub" }} if (gt (len $mirrors) 0) {{ "hub}}" }}
            {{ "{{hub" }} if $useIDMS {{ "hub}}" }}
            - complianceType: musthave
              objectDefinition:
                apiVersion: config.openshift.io/v1
                kind: ImageDigestMirrorSet
                metadata:
                  name: autoshift-disconnected-mirrors
                spec:
                  imageDigestMirrors:
                  {{ "{{hub" }} range $_, $entry := $mirrors {{ "hub}}" }}
                  {{ "{{hub" }} $source := (index $entry "source") {{ "hub}}" }}
                  {{ "{{hub" }} $mirrorLoc := (index $entry "mirror" | default "") {{ "hub}}" }}
                  {{ "{{hub" }} if $mirrorLoc {{ "hub}}" }}
                  {{ "{{hub" }} $mirrorLoc = (printf "%s/%s" $mirrorHost $mirrorLoc) {{ "hub}}" }}
                  {{ "{{hub" }} else {{ "hub}}" }}
                  {{ "{{hub" }} $mirrorLoc = $url {{ "hub}}" }}
                  {{ "{{hub" }} end {{ "hub}}" }}
                    - source: {{ "{{hub" }} $source {{ "hub}}" }}
                      mirrors:
                        - '{{ "{{hub" }} $mirrorLoc {{ "hub}}" }}'
                  {{ "{{hub" }} end {{ "hub}}" }}
            {{ "{{hub" }} else {{ "hub}}" }}
            - complianceType: musthave
              objectDefinition:
                apiVersion: operator.openshift.io/v1alpha1
                kind: ImageContentSourcePolicy
                metadata:
                  name: autoshift-disconnected-mirrors
                spec:
                  repositoryDigestMirrors:
                  {{ "{{hub" }} range $_, $entry := $mirrors {{ "hub}}" }}
                  {{ "{{hub" }} $source := (index $entry "source") {{ "hub}}" }}
                  {{ "{{hub" }} $mirrorLoc := (index $entry "mirror" | default "") {{ "hub}}" }}
                  {{ "{{hub" }} if $mirrorLoc {{ "hub}}" }}
                  {{ "{{hub" }} $mirrorLoc = (printf "%s/%s" $mirrorHost $mirrorLoc) {{ "hub}}" }}
                  {{ "{{hub" }} else {{ "hub}}" }}
                  {{ "{{hub" }} $mirrorLoc = $url {{ "hub}}" }}
                  {{ "{{hub" }} end {{ "hub}}" }}
                    - source: {{ "{{hub" }} $source {{ "hub}}" }}
                      mirrors:
                        - '{{ "{{hub" }} $mirrorLoc {{ "hub}}" }}'
                  {{ "{{hub" }} end {{ "hub}}" }}
            {{ "{{hub" }} end {{ "hub}}" }}
            {{ "{{hub" }} end {{ "hub}}" }}
            {{- /* ImageTagMirrorSet for certified/unsigned operators that reference images by tag */}}
            {{ "{{hub-" }} $tagMirrors := (index $mirror "tagMirrors" | default list) {{ "hub}}" }}
            {{ "{{hub" }} if and $useIDMS (gt (len $tagMirrors) 0) {{ "hub}}" }}
            - complianceType: musthave
              objectDefinition:
                apiVersion: config.openshift.io/v1
                kind: ImageTagMirrorSet
                metadata:
                  name: autoshift-disconnected-tag-mirrors
                spec:
                  imageTagMirrors:
                  {{ "{{hub" }} range $_, $entry := $tagMirrors {{ "hub}}" }}
                  {{ "{{hub" }} $source := (index $entry "source") {{ "hub}}" }}
                  {{ "{{hub" }} $mirrorLoc := (index $entry "mirror" | default "") {{ "hub}}" }}
                  {{ "{{hub" }} if $mirrorLoc {{ "hub}}" }}
                  {{ "{{hub" }} $mirrorLoc = (printf "%s/%s" $mirrorHost $mirrorLoc) {{ "hub}}" }}
                  {{ "{{hub" }} else {{ "hub}}" }}
                  {{ "{{hub" }} $mirrorLoc = $url {{ "hub}}" }}
                  {{ "{{hub" }} end {{ "hub}}" }}
                    - source: {{ "{{hub" }} $source {{ "hub}}" }}
                      mirrors:
                        - '{{ "{{hub" }} $mirrorLoc {{ "hub}}" }}'
                  {{ "{{hub" }} end {{ "hub}}" }}
            {{ "{{hub" }} end {{ "hub}}" }}
---
apiVersion: cluster.open-cluster-management.io/v1beta1
kind: Placement
metadata:
  name: placement-policy-disconnected-image-mirrors
  namespace: {{ $policyNamespace }}
spec:
  clusterSets:
  {{- range $clusterSet, $value := .Values.managedClusterSets }}
    - {{ $clusterSet }}
  {{- end }}
  {{- range $clusterSet, $value := .Values.hubClusterSets }}
    - {{ $clusterSet }}
  {{- end }}
  predicates:
    - requiredClusterSelector:
        labelSelector:
          matchExpressions:
            - key: 'autoshift.io/disconnected-mirror'
              operator: In
              values:
              - 'true'
  tolerations:
    - key: cluster.open-cluster-management.io/unreachable
      operator: Exists
    - key: cluster.open-cluster-management.io/unavailable
      operator: Exists
---
apiVersion: policy.open-cluster-management.io/v1
kind: PlacementBinding
metadata:
  name: placement-policy-disconnected-image-mirrors
  namespace: {{ $policyNamespace }}
placementRef:
  name: placement-policy-disconnected-image-mirrors
  apiGroup: cluster.open-cluster-management.io
  kind: Placement
subjects:
  - name: policy-disconnected-image-mirrors
    apiGroup: policy.open-cluster-management.io
    kind: Policy
