{{- /* ================================================================== */}}
{{- /* Generates NNCPs from the rendered-config ConfigMap.                 */}}
{{- /* Hub templates read config via fromYaml; a regular template looks    */}}
{{- /* up dns.config.openshift.io on the managed cluster for FQDN.       */}}
{{- /* ================================================================== */}}
apiVersion: policy.open-cluster-management.io/v1
kind: Policy
metadata:
  name: policy-nmstate-nncp
  namespace: {{ .Values.policy_namespace }}
  annotations:
    policy.open-cluster-management.io/standards: NIST SP 800-53
    policy.open-cluster-management.io/categories: CM Configuration Management
    policy.open-cluster-management.io/controls: CM-2 Baseline Configuration
spec:
{{ if (($.Values.autoshift).dryRun) }}
  remediationAction: inform
{{ end }}
  dependencies:
    - name: policy-nmstate
      namespace: {{ .Values.policy_namespace }}
      apiVersion: policy.open-cluster-management.io/v1
      compliance: Compliant
      kind: Policy
  disabled: false
  policy-templates:
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: nmstate-operator-nmstate-nncp
        spec:
          remediationAction: enforce
          severity: high
          evaluationInterval:
            compliant: {{ ((($.Values.autoshift).evaluationInterval).compliant) | default "10m" }}
            noncompliant: {{ ((($.Values.autoshift).evaluationInterval).noncompliant) | default "30s" }}
          object-templates-raw: |
            {{ "{{hub" }} $cm := (lookup "v1" "ConfigMap" "{{ $.Values.policy_namespace }}" (printf "%s.rendered-config" .ManagedClusterName)) {{ "hub}}" }}
            {{/*Read rendered-config and parse into structured data */}}
            {{ "{{hub-" }} $config := (index ($cm.data | default dict) "config" | default "" | fromYaml) {{ "hub}}" }}
            {{ "{{hub-" }} $networking := (index $config "networking" | default dict) {{ "hub}}" }}
            {{ "{{hub-" }} $interfaces := (index $networking "interfaces" | default dict) {{ "hub}}" }}
            {{ "{{hub-" }} $hosts := (index $config "hosts" | default dict) {{ "hub}}" }}
            {{ "{{hub-" }} $nodeSelector := (index $networking "nodeSelector" | default dict) {{ "hub}}" }}
            {{ "{{hub-" }} $routes := (index $networking "routes" | default dict) {{ "hub}}" }}
            {{ "{{hub-" }} $dns := (index $networking "dns" | default dict) {{ "hub}}" }}
            {{ "{{hub-" }} $ovsBridges := (index $networking "ovsBridges" | default dict) {{ "hub}}" }}
            {{ "{{hub-" }} $ovnMappings := (index $networking "ovnMappings" | default dict) {{ "hub}}" }}
            {{/*DNS lookup on managed cluster for per-host FQDN construction */}}
            {{ "{{" }} $clusterDomain := ((lookup "config.openshift.io/v1" "DNS" "" "cluster").spec.baseDomain | default "") {{ "}}" }}
            {{/*Build set of interface IDs that have per-host overrides */}}
            {{ "{{hub-" }} $perHostIfaceIds := dict {{ "hub}}" }}
            {{ "{{hub-" }} range $hostname, $host := $hosts {{ "hub}}" }}
              {{ "{{hub-" }} $hostNet := (index $host "networking" | default dict) {{ "hub}}" }}
              {{ "{{hub-" }} $hostIfaces := (index $hostNet "interfaces" | default dict) {{ "hub}}" }}
              {{ "{{hub-" }} range $ifaceId, $_ := $hostIfaces {{ "hub}}" }}
                {{ "{{hub-" }} $_ := set $perHostIfaceIds $ifaceId "true" {{ "hub}}" }}
              {{ "{{hub-" }} end {{ "hub}}" }}
            {{ "{{hub-" }} end {{ "hub}}" }}
            {{/*Cluster-wide NNCPs per interface (skip per-host ones) */}}
            {{ "{{hub-" }} range $id, $iface := $interfaces {{ "hub}}" }}
              {{ "{{hub-" }} if not (hasKey $perHostIfaceIds $id) {{ "hub}}" }}
                {{ "{{hub-" }} $ifaceType := (index $iface "type" | default "ethernet") {{ "hub}}" }}
                {{ "{{hub-" }} $ifaceName := (index $iface "name" | default "") {{ "hub}}" }}
                {{ "{{hub-" }} $ifaceState := (index $iface "state" | default "up") {{ "hub}}" }}
                {{ "{{hub-" }} $ifaceMtu := (index $iface "mtu" | default "") {{ "hub}}" }}
                {{ "{{hub-" }} $ifaceMac := (index $iface "mac" | default "") {{ "hub}}" }}
                {{ "{{hub-" }} $ifaceIpv4 := (index $iface "ipv4" | default "disabled") {{ "hub}}" }}
                {{ "{{hub-" }} $ifaceIpv6 := (index $iface "ipv6" | default "disabled") {{ "hub}}" }}
            - complianceType: mustonlyhave
              objectDefinition:
                apiVersion: nmstate.io/v1
                kind: NodeNetworkConfigurationPolicy
                metadata:
                  name: nmstate-{{ "{{hub" }} $ifaceType {{ "hub}}" }}-{{ "{{hub" }} $id {{ "hub}}" }}
                spec:
                {{ "{{hub-" }} if (gt (len (keys $nodeSelector)) 0) {{ "hub}}" }}
                  nodeSelector:
                    {{ "{{hub" }} $nodeSelector | toYaml | autoindent {{ "hub}}" }}
                {{ "{{hub-" }} end {{ "hub}}" }}
                  desiredState:
                    interfaces:
                      - name: {{ "{{hub" }} $ifaceName {{ "hub}}" }}
                        type: {{ "{{hub" }} $ifaceType {{ "hub}}" }}
                        state: {{ "{{hub" }} $ifaceState {{ "hub}}" }}
                {{ "{{hub-" }} if $ifaceMac {{ "hub}}" }}
                        identifier: mac-address
                        mac-address: '{{ "{{hub" }} $ifaceMac {{ "hub}}" }}'
                {{ "{{hub-" }} end {{ "hub}}" }}
                {{ "{{hub-" }} if $ifaceMtu {{ "hub}}" }}
                        mtu: {{ "{{hub" }} $ifaceMtu {{ "hub}}" }}
                {{ "{{hub-" }} end {{ "hub}}" }}
                {{ "{{hub-" }} if eq $ifaceIpv4 "disabled" {{ "hub}}" }}
                        ipv4:
                          enabled: false
                {{ "{{hub-" }} else if eq $ifaceIpv4 "dhcp" {{ "hub}}" }}
                        ipv4:
                          enabled: true
                          dhcp: true
                {{ "{{hub-" }} else if eq $ifaceIpv4 "static" {{ "hub}}" }}
                        ipv4:
                          enabled: true
                          dhcp: false
                {{ "{{hub-" }} end {{ "hub}}" }}
                {{ "{{hub-" }} if eq $ifaceIpv6 "disabled" {{ "hub}}" }}
                        ipv6:
                          enabled: false
                {{ "{{hub-" }} else if eq $ifaceIpv6 "dhcp" {{ "hub}}" }}
                        ipv6:
                          enabled: true
                          dhcp: true
                {{ "{{hub-" }} else if eq $ifaceIpv6 "autoconf" {{ "hub}}" }}
                        ipv6:
                          enabled: true
                          autoconf: true
                {{ "{{hub-" }} else if eq $ifaceIpv6 "static" {{ "hub}}" }}
                        ipv6:
                          enabled: true
                          dhcp: false
                          autoconf: false
                {{ "{{hub-" }} end {{ "hub}}" }}
                {{ "{{hub-" }} if eq $ifaceType "bond" {{ "hub}}" }}
                  {{ "{{hub-" }} $bondMode := (index $iface "mode" | default "802.3ad") {{ "hub}}" }}
                  {{ "{{hub-" }} $bondMiimon := (index $iface "miimon" | default "") {{ "hub}}" }}
                  {{ "{{hub-" }} $bondPorts := (index $iface "ports" | default list) {{ "hub}}" }}
                        link-aggregation:
                          mode: {{ "{{hub" }} $bondMode {{ "hub}}" }}
                  {{ "{{hub-" }} if $bondMiimon {{ "hub}}" }}
                          options:
                            miimon: {{ "{{hub" }} $bondMiimon {{ "hub}}" }}
                  {{ "{{hub-" }} end {{ "hub}}" }}
                  {{ "{{hub-" }} if (gt (len $bondPorts) 0) {{ "hub}}" }}
                          port:
                    {{ "{{hub-" }} range $_, $port := $bondPorts {{ "hub}}" }}
                            - {{ "{{hub" }} $port {{ "hub}}" }}
                    {{ "{{hub-" }} end {{ "hub}}" }}
                  {{ "{{hub-" }} end {{ "hub}}" }}
                {{ "{{hub-" }} end {{ "hub}}" }}
                {{ "{{hub-" }} if eq $ifaceType "vlan" {{ "hub}}" }}
                  {{ "{{hub-" }} $vlanId := (index $iface "id" | default 0) {{ "hub}}" }}
                  {{ "{{hub-" }} $vlanBase := (index $iface "base" | default "") {{ "hub}}" }}
                        vlan:
                          base-iface: {{ "{{hub" }} $vlanBase {{ "hub}}" }}
                          id: {{ "{{hub" }} $vlanId {{ "hub}}" }}
                {{ "{{hub-" }} end {{ "hub}}" }}
              {{ "{{hub-" }} end {{ "hub}}" }}
            {{ "{{hub-" }} end {{ "hub}}" }}
            {{/*OVS bridge NNCPs */}}
            {{ "{{hub-" }} range $id, $bridge := $ovsBridges {{ "hub}}" }}
              {{ "{{hub-" }} $bridgeName := (index $bridge "name" | default (printf "ovs-br-%s" $id)) {{ "hub}}" }}
              {{ "{{hub-" }} $stp := (index $bridge "stp" | default false) {{ "hub}}" }}
              {{ "{{hub-" }} $allowExtraPatch := (index $bridge "allowExtraPatchPorts" | default true) {{ "hub}}" }}
              {{ "{{hub-" }} $bridgePorts := (index $bridge "ports" | default list) {{ "hub}}" }}
              {{ "{{hub-" }} $mcastSnooping := (index $bridge "mcastSnooping" | default "") {{ "hub}}" }}
            - complianceType: mustonlyhave
              objectDefinition:
                apiVersion: nmstate.io/v1
                kind: NodeNetworkConfigurationPolicy
                metadata:
                  name: nmstate-ovs-bridge-{{ "{{hub" }} $id {{ "hub}}" }}
                spec:
                {{ "{{hub-" }} if (gt (len (keys $nodeSelector)) 0) {{ "hub}}" }}
                  nodeSelector:
                    {{ "{{hub" }} $nodeSelector | toYaml | autoindent {{ "hub}}" }}
                {{ "{{hub-" }} end {{ "hub}}" }}
                  desiredState:
                    interfaces:
                      - name: {{ "{{hub" }} $bridgeName {{ "hub}}" }}
                        type: ovs-bridge
                        state: up
                        bridge:
                          allow-extra-patch-ports: {{ "{{hub" }} $allowExtraPatch {{ "hub}}" }}
                          options:
                            stp: {{ "{{hub" }} $stp {{ "hub}}" }}
                {{ "{{hub-" }} if $mcastSnooping {{ "hub}}" }}
                            mcast-snooping-enable: {{ "{{hub" }} $mcastSnooping {{ "hub}}" }}
                {{ "{{hub-" }} end {{ "hub}}" }}
                {{ "{{hub-" }} if (gt (len $bridgePorts) 0) {{ "hub}}" }}
                          port:
                  {{ "{{hub-" }} range $_, $port := $bridgePorts {{ "hub}}" }}
                            - name: {{ "{{hub" }} $port {{ "hub}}" }}
                  {{ "{{hub-" }} end {{ "hub}}" }}
                {{ "{{hub-" }} end {{ "hub}}" }}
            {{ "{{hub-" }} end {{ "hub}}" }}
            {{/*Combined nmstate-network-config NNCP (routes+dns+ovn) */}}
            {{ "{{hub-" }} $dnsServers := (index $dns "servers" | default list) {{ "hub}}" }}
            {{ "{{hub-" }} $dnsSearch := (index $dns "search" | default list) {{ "hub}}" }}
            {{ "{{hub-" }} if or (gt (len (keys $routes)) 0) (or (gt (len $dnsServers) 0) (or (gt (len $dnsSearch) 0) (gt (len (keys $ovnMappings)) 0))) {{ "hub}}" }}
            - complianceType: mustonlyhave
              objectDefinition:
                apiVersion: nmstate.io/v1
                kind: NodeNetworkConfigurationPolicy
                metadata:
                  name: nmstate-network-config
                spec:
                {{ "{{hub-" }} if (gt (len (keys $nodeSelector)) 0) {{ "hub}}" }}
                  nodeSelector:
                    {{ "{{hub" }} $nodeSelector | toYaml | autoindent {{ "hub}}" }}
                {{ "{{hub-" }} end {{ "hub}}" }}
                  desiredState:
                {{ "{{hub-" }} if (gt (len (keys $routes)) 0) {{ "hub}}" }}
                    routes:
                      config:
                  {{ "{{hub-" }} range $routeId, $route := $routes {{ "hub}}" }}
                    {{ "{{hub-" }} $metric := (index $route "metric" | default "") {{ "hub}}" }}
                    {{ "{{hub-" }} $tableId := (index $route "tableId" | default "") {{ "hub}}" }}
                        - destination: {{ "{{hub" }} index $route "destination" {{ "hub}}" }}
                          next-hop-address: {{ "{{hub" }} index $route "gateway" {{ "hub}}" }}
                          next-hop-interface: {{ "{{hub" }} index $route "interface" {{ "hub}}" }}
                    {{ "{{hub-" }} if $metric {{ "hub}}" }}
                          metric: {{ "{{hub" }} $metric {{ "hub}}" }}
                    {{ "{{hub-" }} end {{ "hub}}" }}
                    {{ "{{hub-" }} if $tableId {{ "hub}}" }}
                          table-id: {{ "{{hub" }} $tableId {{ "hub}}" }}
                    {{ "{{hub-" }} end {{ "hub}}" }}
                  {{ "{{hub-" }} end {{ "hub}}" }}
                {{ "{{hub-" }} end {{ "hub}}" }}
                {{ "{{hub-" }} if or (gt (len $dnsServers) 0) (gt (len $dnsSearch) 0) {{ "hub}}" }}
                    dns-resolver:
                      config:
                  {{ "{{hub-" }} if (gt (len $dnsServers) 0) {{ "hub}}" }}
                        server:
                    {{ "{{hub-" }} range $_, $server := $dnsServers {{ "hub}}" }}
                          - {{ "{{hub" }} $server {{ "hub}}" }}
                    {{ "{{hub-" }} end {{ "hub}}" }}
                  {{ "{{hub-" }} end {{ "hub}}" }}
                  {{ "{{hub-" }} if (gt (len $dnsSearch) 0) {{ "hub}}" }}
                        search:
                    {{ "{{hub-" }} range $_, $domain := $dnsSearch {{ "hub}}" }}
                          - {{ "{{hub" }} $domain {{ "hub}}" }}
                    {{ "{{hub-" }} end {{ "hub}}" }}
                  {{ "{{hub-" }} end {{ "hub}}" }}
                {{ "{{hub-" }} end {{ "hub}}" }}
                {{ "{{hub-" }} if (gt (len (keys $ovnMappings)) 0) {{ "hub}}" }}
                    ovn:
                      bridge-mappings:
                  {{ "{{hub-" }} range $mappingId, $mapping := $ovnMappings {{ "hub}}" }}
                        - localnet: {{ "{{hub" }} index $mapping "localnet" {{ "hub}}" }}
                          bridge: {{ "{{hub" }} index $mapping "bridge" {{ "hub}}" }}
                          state: present
                  {{ "{{hub-" }} end {{ "hub}}" }}
                {{ "{{hub-" }} end {{ "hub}}" }}
            {{ "{{hub-" }} end {{ "hub}}" }}
            {{/*Per-host NNCPs */}}
            {{ "{{hub-" }} range $hostname, $host := $hosts {{ "hub}}" }}
              {{ "{{hub-" }} $hostNet := (index $host "networking" | default dict) {{ "hub}}" }}
              {{ "{{hub-" }} $hostIfaces := (index $hostNet "interfaces" | default dict) {{ "hub}}" }}
              {{ "{{hub-" }} $hostRoutes := (index $hostNet "routes" | default dict) {{ "hub}}" }}
              {{ "{{hub-" }} $hostDns := (index $hostNet "dns" | default dict) {{ "hub}}" }}
              {{ "{{hub-" }} if or (gt (len (keys $hostIfaces)) 0) (or (gt (len (keys $hostRoutes)) 0) (gt (len (keys $hostDns)) 0)) {{ "hub}}" }}
                {{ "{{hub-" }} $hostOverrideHostname := (index $host "hostname" | default "") {{ "hub}}" }}
            - complianceType: mustonlyhave
              objectDefinition:
                apiVersion: nmstate.io/v1
                kind: NodeNetworkConfigurationPolicy
                metadata:
                  name: nmstate-host-{{ "{{hub" }} $hostname {{ "hub}}" }}
                spec:
                  nodeSelector:
                  {{ "{{hub-" }} if $hostOverrideHostname {{ "hub}}" }}
                    kubernetes.io/hostname: {{ "{{hub" }} $hostOverrideHostname {{ "hub}}" }}
                  {{ "{{hub-" }} else {{ "hub}}" }}
                    kubernetes.io/hostname: {{ "{{hub" }} $hostname {{ "hub}}" }}.{{ "{{" }} $clusterDomain {{ "}}" }}
                  {{ "{{hub-" }} end {{ "hub}}" }}
                  desiredState:
                {{ "{{hub-" }} if (gt (len (keys $hostIfaces)) 0) {{ "hub}}" }}
                    interfaces:
                {{ "{{hub-" }} range $ifaceId, $hostOverride := $hostIfaces {{ "hub}}" }}
                  {{ "{{hub-" }} $topoIface := (index $interfaces $ifaceId | default dict) {{ "hub}}" }}
                  {{ "{{hub-" }} $ifaceType := (index $topoIface "type" | default "ethernet") {{ "hub}}" }}
                  {{ "{{hub-" }} $ifaceName := (index $topoIface "name" | default "") {{ "hub}}" }}
                  {{ "{{hub-" }} $ifaceState := (index $topoIface "state" | default "up") {{ "hub}}" }}
                  {{ "{{hub-" }} $ifaceMtu := (index $topoIface "mtu" | default "") {{ "hub}}" }}
                  {{ "{{hub-" }} $ifaceMac := (index $hostOverride "mac" | default (index $topoIface "mac" | default "")) {{ "hub}}" }}
                  {{ "{{hub-" }} $topoIpv4 := (index $topoIface "ipv4" | default "disabled") {{ "hub}}" }}
                  {{ "{{hub-" }} $topoIpv6 := (index $topoIface "ipv6" | default "disabled") {{ "hub}}" }}
                  {{ "{{hub-" }} $hostIpv4 := (index $hostOverride "ipv4" | default dict) {{ "hub}}" }}
                  {{ "{{hub-" }} $hostIpv4Addrs := (index $hostIpv4 "addresses" | default list) {{ "hub}}" }}
                  {{ "{{hub-" }} $hostIpv6 := (index $hostOverride "ipv6" | default dict) {{ "hub}}" }}
                  {{ "{{hub-" }} $hostIpv6Addrs := (index $hostIpv6 "addresses" | default list) {{ "hub}}" }}
                  {{ "{{hub-" }} $hostPorts := (index $hostOverride "ports" | default list) {{ "hub}}" }}
                  {{ "{{hub-" }} $ports := $hostPorts {{ "hub}}" }}
                  {{ "{{hub-" }} if (eq (len $ports) 0) {{ "hub}}" }}
                    {{ "{{hub-" }} $ports = (index $topoIface "ports" | default list) {{ "hub}}" }}
                  {{ "{{hub-" }} end {{ "hub}}" }}
                      - name: {{ "{{hub" }} $ifaceName {{ "hub}}" }}
                        type: {{ "{{hub" }} $ifaceType {{ "hub}}" }}
                        state: {{ "{{hub" }} $ifaceState {{ "hub}}" }}
                  {{ "{{hub-" }} if $ifaceMac {{ "hub}}" }}
                        identifier: mac-address
                        mac-address: '{{ "{{hub" }} $ifaceMac {{ "hub}}" }}'
                  {{ "{{hub-" }} end {{ "hub}}" }}
                  {{ "{{hub-" }} if $ifaceMtu {{ "hub}}" }}
                        mtu: {{ "{{hub" }} $ifaceMtu {{ "hub}}" }}
                  {{ "{{hub-" }} end {{ "hub}}" }}
                  {{ "{{hub-" }} if eq $topoIpv4 "static" {{ "hub}}" }}
                        ipv4:
                          enabled: true
                          dhcp: false
                    {{ "{{hub-" }} if (gt (len $hostIpv4Addrs) 0) {{ "hub}}" }}
                          address:
                      {{ "{{hub-" }} range $_, $addr := $hostIpv4Addrs {{ "hub}}" }}
                            - ip: {{ "{{hub" }} index $addr "ip" {{ "hub}}" }}
                              prefix-length: {{ "{{hub" }} index $addr "prefixLength" {{ "hub}}" }}
                      {{ "{{hub-" }} end {{ "hub}}" }}
                    {{ "{{hub-" }} end {{ "hub}}" }}
                  {{ "{{hub-" }} else if eq $topoIpv4 "dhcp" {{ "hub}}" }}
                        ipv4:
                          enabled: true
                          dhcp: true
                  {{ "{{hub-" }} else {{ "hub}}" }}
                        ipv4:
                          enabled: false
                  {{ "{{hub-" }} end {{ "hub}}" }}
                  {{ "{{hub-" }} if eq $topoIpv6 "static" {{ "hub}}" }}
                        ipv6:
                          enabled: true
                          dhcp: false
                          autoconf: false
                    {{ "{{hub-" }} if (gt (len $hostIpv6Addrs) 0) {{ "hub}}" }}
                          address:
                      {{ "{{hub-" }} range $_, $addr := $hostIpv6Addrs {{ "hub}}" }}
                            - ip: {{ "{{hub" }} index $addr "ip" {{ "hub}}" }}
                              prefix-length: {{ "{{hub" }} index $addr "prefixLength" {{ "hub}}" }}
                      {{ "{{hub-" }} end {{ "hub}}" }}
                    {{ "{{hub-" }} end {{ "hub}}" }}
                  {{ "{{hub-" }} else if eq $topoIpv6 "dhcp" {{ "hub}}" }}
                        ipv6:
                          enabled: true
                          dhcp: true
                  {{ "{{hub-" }} else if eq $topoIpv6 "autoconf" {{ "hub}}" }}
                        ipv6:
                          enabled: true
                          autoconf: true
                  {{ "{{hub-" }} else {{ "hub}}" }}
                        ipv6:
                          enabled: false
                  {{ "{{hub-" }} end {{ "hub}}" }}
                  {{ "{{hub-" }} if eq $ifaceType "bond" {{ "hub}}" }}
                    {{ "{{hub-" }} $bondMode := (index $topoIface "mode" | default "802.3ad") {{ "hub}}" }}
                    {{ "{{hub-" }} $bondMiimon := (index $topoIface "miimon" | default "") {{ "hub}}" }}
                        link-aggregation:
                          mode: {{ "{{hub" }} $bondMode {{ "hub}}" }}
                    {{ "{{hub-" }} if $bondMiimon {{ "hub}}" }}
                          options:
                            miimon: {{ "{{hub" }} $bondMiimon {{ "hub}}" }}
                    {{ "{{hub-" }} end {{ "hub}}" }}
                    {{ "{{hub-" }} if (gt (len $ports) 0) {{ "hub}}" }}
                          port:
                      {{ "{{hub-" }} range $_, $port := $ports {{ "hub}}" }}
                            - {{ "{{hub" }} $port {{ "hub}}" }}
                      {{ "{{hub-" }} end {{ "hub}}" }}
                    {{ "{{hub-" }} end {{ "hub}}" }}
                  {{ "{{hub-" }} end {{ "hub}}" }}
                  {{ "{{hub-" }} if eq $ifaceType "vlan" {{ "hub}}" }}
                    {{ "{{hub-" }} $vlanId := (index $topoIface "id" | default 0) {{ "hub}}" }}
                    {{ "{{hub-" }} $vlanBase := (index $topoIface "base" | default "") {{ "hub}}" }}
                        vlan:
                          base-iface: {{ "{{hub" }} $vlanBase {{ "hub}}" }}
                          id: {{ "{{hub" }} $vlanId {{ "hub}}" }}
                  {{ "{{hub-" }} end {{ "hub}}" }}
                {{ "{{hub-" }} end {{ "hub}}" }}
                {{ "{{hub-" }} end {{ "hub}}" }}
                {{ "{{hub-" }} if (gt (len (keys $hostRoutes)) 0) {{ "hub}}" }}
                    routes:
                      config:
                  {{ "{{hub-" }} range $routeId, $route := $hostRoutes {{ "hub}}" }}
                    {{ "{{hub-" }} $metric := (index $route "metric" | default "") {{ "hub}}" }}
                    {{ "{{hub-" }} $tableId := (index $route "tableId" | default "") {{ "hub}}" }}
                        - destination: {{ "{{hub" }} index $route "destination" {{ "hub}}" }}
                          next-hop-address: {{ "{{hub" }} index $route "gateway" {{ "hub}}" }}
                          next-hop-interface: {{ "{{hub" }} index $route "interface" {{ "hub}}" }}
                    {{ "{{hub-" }} if $metric {{ "hub}}" }}
                          metric: {{ "{{hub" }} $metric {{ "hub}}" }}
                    {{ "{{hub-" }} end {{ "hub}}" }}
                    {{ "{{hub-" }} if $tableId {{ "hub}}" }}
                          table-id: {{ "{{hub" }} $tableId {{ "hub}}" }}
                    {{ "{{hub-" }} end {{ "hub}}" }}
                  {{ "{{hub-" }} end {{ "hub}}" }}
                {{ "{{hub-" }} end {{ "hub}}" }}
                {{ "{{hub-" }} $hostDnsServers := (index $hostDns "servers" | default list) {{ "hub}}" }}
                {{ "{{hub-" }} $hostDnsSearch := (index $hostDns "search" | default list) {{ "hub}}" }}
                {{ "{{hub-" }} if or (gt (len $hostDnsServers) 0) (gt (len $hostDnsSearch) 0) {{ "hub}}" }}
                    dns-resolver:
                      config:
                  {{ "{{hub-" }} if (gt (len $hostDnsServers) 0) {{ "hub}}" }}
                        server:
                    {{ "{{hub-" }} range $_, $server := $hostDnsServers {{ "hub}}" }}
                          - {{ "{{hub" }} $server {{ "hub}}" }}
                    {{ "{{hub-" }} end {{ "hub}}" }}
                  {{ "{{hub-" }} end {{ "hub}}" }}
                  {{ "{{hub-" }} if (gt (len $hostDnsSearch) 0) {{ "hub}}" }}
                        search:
                    {{ "{{hub-" }} range $_, $domain := $hostDnsSearch {{ "hub}}" }}
                          - {{ "{{hub" }} $domain {{ "hub}}" }}
                    {{ "{{hub-" }} end {{ "hub}}" }}
                  {{ "{{hub-" }} end {{ "hub}}" }}
                {{ "{{hub-" }} end {{ "hub}}" }}
              {{ "{{hub-" }} end {{ "hub}}" }}
            {{ "{{hub-" }} end {{ "hub}}" }}
---
apiVersion: cluster.open-cluster-management.io/v1beta1
kind: Placement
metadata:
  name: placement-policy-nmstate-nncp
  namespace: {{ .Values.policy_namespace }}
spec:
  clusterSets:
  {{- range $clusterSet, $value := $.Values.managedClusterSets }}
    - {{ $clusterSet }}
  {{- end }}
  {{- range $clusterSet, $value := $.Values.hubClusterSets }}
    - {{ $clusterSet }}
  {{- end }}
  predicates:
    - requiredClusterSelector:
        labelSelector:
          matchExpressions:
            - key: 'autoshift.io/nmstate'
              operator: In
              values:
              - 'true'
  tolerations:
    - key: cluster.open-cluster-management.io/unreachable
      operator: Exists
    - key: cluster.open-cluster-management.io/unavailable
      operator: Exists
---
apiVersion: policy.open-cluster-management.io/v1
kind: PlacementBinding
metadata:
  name: placement-policy-nmstate-nncp
  namespace: {{ .Values.policy_namespace }}
placementRef:
  name: placement-policy-nmstate-nncp
  apiGroup: cluster.open-cluster-management.io
  kind: Placement
subjects:
  - name: policy-nmstate-nncp
    apiGroup: policy.open-cluster-management.io
    kind: Policy
