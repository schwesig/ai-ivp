# Default values for nmstate.
policy_namespace: open-cluster-policies
nmstate:
    name: kubernetes-nmstate-operator
    namespace: openshift-nmstate
    channel: stable
    source: redhat-operators
    sourceNamespace: openshift-marketplace

# ==============================================================================
# AutoShift NMState Configuration Reference
# ==============================================================================
#
# NNCPs are generated from structured YAML under config.networking in clusterset
# or cluster values files. This replaces the old label-based system entirely.
#
# --- How it works ---
# 1. You define interface topology + routes + DNS under config.networking
# 2. You define per-host overrides (IPs, ports) under config.hosts.*.networking
# 3. The rendered-config policy merges clusterset + cluster config
# 4. The nmstate NNCP policy reads the merged config and generates NNCPs
#
# --- NNCP generation rules ---
# - Each interface in networking.interfaces gets its own NNCP
# - Routes + DNS + OVN mappings combine into one nmstate-network-config NNCP
# - OVS bridges each get their own NNCP
# - If ANY host has per-host overrides for an interface, that interface gets
#   per-host NNCPs (one per host) instead of a cluster-wide NNCP
# - Per-host NNCPs use kubernetes.io/hostname nodeSelector (auto-constructed
#   from mapKey + cluster domain via DNS lookup, or overridden with hostname)
#
# ==============================================================================
# Labels (operator only)
# ==============================================================================
# nmstate: 'true'                     — Enable NMState operator
# nmstate-channel: 'stable'           — Operator channel
# nmstate-version: ''                 — Pin to specific CSV version
# nmstate-source: 'redhat-operators'  — Catalog source
# nmstate-source-namespace: 'openshift-marketplace'
#
# ==============================================================================
# Config Structure
# ==============================================================================
#
# config:
#   # baseDomain is optional — used for per-host FQDN construction in nmstate.
#   # Not needed if cluster was deployed through ACM (ClusterDeployment lookup)
#   # or if the cluster's dns.config.openshift.io is reachable (auto-detected).
#   # baseDomain: example.com
#
#   networking:
#     # ------------------------------------------------------------------
#     # Interface Topology (map keyed by user-chosen ID)
#     # ------------------------------------------------------------------
#     # IDs are arbitrary names (mgmt, data, storage, nic1, etc.) used to:
#     #   - Name the generated NNCP: nmstate-{type}-{id}
#     #   - Reference interfaces in per-host overrides
#     #   - Reference as VLAN base interfaces (by interface name, not ID)
#     #
#     # Supported types: bond, vlan, ethernet
#     #
#     interfaces:
#       # --- Bond Example ---
#       mgmt:
#         type: bond
#         name: bond0                  # nmstate interface name
#         state: up                    # default: up
#         mode: 802.3ad               # bond mode (802.3ad, active-backup, etc.)
#         mtu: 9000                   # optional
#         miimon: 100                 # MII monitoring interval (optional)
#         mac: 'aa:bb:cc:dd:ee:ff'    # optional — sets MAC and adds identifier: mac-address
#         ports:                      # bond member interfaces
#           - eno1
#           - eno2
#         ipv4: disabled              # disabled | dhcp | static
#         ipv6: disabled              # disabled | dhcp | autoconf | static
#
#       # --- VLAN Example ---
#       mgmt-vlan:
#         type: vlan
#         name: bond0.100             # nmstate interface name
#         id: 100                     # VLAN ID (required for vlan type)
#         base: bond0                 # parent interface name (required for vlan)
#         mtu: 1500                   # optional
#         ipv4: static               # per-host IPs go in hosts.*.networking
#         ipv6: disabled
#
#       # --- Second VLAN on same bond ---
#       storage-vlan:
#         type: vlan
#         name: bond0.200
#         id: 200
#         base: bond0
#         ipv4: static
#         ipv6: disabled
#
#       # --- Ethernet Example ---
#       nic3:
#         type: ethernet
#         name: eno3                  # optional if mac is set
#         mac: 'aa:bb:cc:dd:ee:03'   # adds identifier: mac-address to NNCP
#         mtu: 9000
#         ipv4: dhcp
#         ipv6: disabled
#
#     # ------------------------------------------------------------------
#     # OVS Bridges (map keyed by user-chosen ID)
#     # ------------------------------------------------------------------
#     # ovsBridges:
#     #   br1:
#     #     name: ovs-br1             # OVS bridge name
#     #     ports: [bond1]            # uplink ports
#     #     stp: false                # spanning tree (default: false)
#     #     allowExtraPatchPorts: true # OVN patch ports (default: true)
#     #     mcastSnooping: false      # multicast snooping (optional)
#
#     # ------------------------------------------------------------------
#     # OVN Bridge Mappings (map keyed by user-chosen ID)
#     # ------------------------------------------------------------------
#     # ovnMappings:
#     #   net1:
#     #     localnet: localnet1       # OVN localnet name
#     #     bridge: ovs-br1           # OVS bridge to map to
#
#     # ------------------------------------------------------------------
#     # Static Routes (map keyed by user-chosen ID)
#     # ------------------------------------------------------------------
#     # Map keys allow clusterset defaults with per-cluster additions.
#     #
#     # routes:
#     #   default:
#     #     destination: 0.0.0.0/0
#     #     gateway: 10.0.0.1
#     #     interface: bond0.100
#     #   dc:
#     #     destination: 10.0.0.0/8
#     #     gateway: 192.168.1.1
#     #     interface: bond0
#     #     metric: 100               # optional
#     #     tableId: 254              # optional
#
#     # ------------------------------------------------------------------
#     # DNS
#     # ------------------------------------------------------------------
#     # dns:
#     #   servers:
#     #     - 10.0.0.53
#     #     - 10.0.0.54
#     #   search:
#     #     - example.com
#     #     - corp.example.com
#
#     # ------------------------------------------------------------------
#     # Node Selector (for cluster-wide NNCPs)
#     # ------------------------------------------------------------------
#     # Applied to all cluster-wide NNCPs. Plain Kubernetes label selector.
#     #
#     # nodeSelector:
#     #   node-role.kubernetes.io/worker: ''
#
#   # ====================================================================
#   # Per-Host Overrides
#   # ====================================================================
#   # Each host can override interface properties from the topology.
#   # Per-host overrides reference topology interface IDs.
#   #
#   # Per-host NNCPs use kubernetes.io/hostname as nodeSelector:
#   #   1. If hosts.*.hostname is set → uses that value as-is
#   #   2. Otherwise → constructs {mapKey}.{clusterDomain} where clusterDomain
#   #      is looked up from dns.config.openshift.io/cluster on the managed cluster
#   #
#   hosts:
#     master-0:
#       # hostname: weird-node.corp.local  # Override if node has non-standard name
#       networking:
#         interfaces:
#           # --- Static IPv4 addresses (references topology interface ID) ---
#           mgmt-vlan:
#             ipv4:
#               addresses:
#                 - ip: 10.0.0.10
#                   prefixLength: 25
#
#           # --- Static IPv6 addresses ---
#           # data-vlan:
#           #   ipv6:
#           #     addresses:
#           #       - ip: 'fd00::10'
#           #         prefixLength: 64
#
#           # --- Override bond ports per-host (different NIC names) ---
#           # mgmt:
#           #   ports: [enp3s0f0, enp3s0f1]
#
#         # --- Per-host routes ---
#         # routes:
#         #   extra:
#         #     destination: 172.16.0.0/12
#         #     gateway: 10.100.1.1
#         #     interface: bond0.100
#
#         # --- Per-host DNS ---
#         # dns:
#         #   servers: [10.0.0.55]
#         #   search: [special.example.com]
#
# ==============================================================================
# IPv4 Modes
# ==============================================================================
# disabled — interface has no IPv4 (enabled: false)
# dhcp     — IPv4 via DHCP (enabled: true, dhcp: true)
# static   — static IPv4; per-host addresses in hosts.*.networking.interfaces
#
# ==============================================================================
# IPv6 Modes
# ==============================================================================
# disabled — interface has no IPv6 (enabled: false)
# dhcp     — IPv6 via DHCPv6 (enabled: true, dhcp: true)
# autoconf — IPv6 via SLAAC (enabled: true, autoconf: true)
# static   — static IPv6; per-host addresses in hosts.*.networking.interfaces
#
# ==============================================================================
# Generated NNCP Names
# ==============================================================================
# Config Path                          → NNCP Name
# ------------------------------------   ----------------------------
# networking.interfaces.{id} (bond)    → nmstate-bond-{id}
# networking.interfaces.{id} (vlan)    → nmstate-vlan-{id}
# networking.interfaces.{id} (ethernet)→ nmstate-ethernet-{id}
# networking.ovsBridges.{id}           → nmstate-ovs-bridge-{id}
# routes + dns + ovnMappings           → nmstate-network-config
# hosts.{name}.networking              → nmstate-host-{name}
#
# ==============================================================================
# Full Example: Dual-stack bond + 2 VLANs + static routes
# ==============================================================================
#
# clusters:
#   prod-cluster:
#     config:
#       networking:
#         interfaces:
#           mgmt:
#             type: bond
#             name: bond0
#             mode: 802.3ad
#             mtu: 9000
#             miimon: 100
#             ports: [eno1, eno2]
#             ipv4: disabled
#             ipv6: disabled
#           mgmt-v4:
#             type: vlan
#             name: bond0.100
#             id: 100
#             base: bond0
#             ipv4: static
#             ipv6: disabled
#           mgmt-v6:
#             type: vlan
#             name: bond0.200
#             id: 200
#             base: bond0
#             ipv4: disabled
#             ipv6: static
#         routes:
#           default-v4:
#             destination: 0.0.0.0/0
#             gateway: 10.0.0.1
#             interface: bond0.100
#           default-v6:
#             destination: '::/0'
#             gateway: 'fd00::1'
#             interface: bond0.200
#         dns:
#           servers: [10.0.0.53, 'fd00::53']
#           search: [example.com]
#       hosts:
#         master-0:
#           networking:
#             interfaces:
#               mgmt-v4:
#                 ipv4:
#                   addresses:
#                     - ip: 10.0.0.10
#                       prefixLength: 25
#               mgmt-v6:
#                 ipv6:
#                   addresses:
#                     - ip: 'fd00::10'
#                       prefixLength: 64
#         master-1:
#           networking:
#             interfaces:
#               mgmt-v4:
#                 ipv4:
#                   addresses:
#                     - ip: 10.0.0.11
#                       prefixLength: 25
#               mgmt-v6:
#                 ipv6:
#                   addresses:
#                     - ip: 'fd00::11'
#                       prefixLength: 64
