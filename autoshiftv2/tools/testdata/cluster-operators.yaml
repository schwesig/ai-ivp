# Stub OperatorGroup — registers the type so per-namespace lookups return
# empty list instead of "API not installed" error.
apiVersion: operators.coreos.com/v1
kind: OperatorGroup
metadata:
  name: global-operators
  namespace: openshift-operators
spec:
  targetNamespaces: []
---
# Stub ClusterServiceVersion — registers the type for gitlab policy lookup.
apiVersion: operators.coreos.com/v1alpha1
kind: ClusterServiceVersion
metadata:
  name: stub-csv
  namespace: openshift-operators
spec:
  displayName: Stub
  version: "0.0.1"
---
# Stub StorageClass — registers the type and provides one entry for
# storage policies that iterate storageclasses.items.
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: gp3-csi
  annotations:
    storageclass.kubernetes.io/is-default-class: "true"
provisioner: ebs.csi.aws.com
reclaimPolicy: Delete
volumeBindingMode: WaitForFirstConsumer
