# Stubs for infra-node policies that look up cluster operator resources.
# policy-remove-infra-gitops performs a spoke lookup of GitopsService to clear
# runOnInfra; the stub ensures the lookup resolves instead of erroring with
# "API resources not installed".

---
apiVersion: pipelines.openshift.io/v1alpha1
kind: GitopsService
metadata:
  name: cluster
  namespace: openshift-gitops
spec:
  runOnInfra: false
