# Stubs for AAP (Ansible Automation Platform) ConfigMaps.
# policy-aap-cert-bundle looks up these ConfigMaps and combines their CA data
# into a combined Secret. The stubs provide fake PEM cert data so the lookup
# resolves and base64enc succeeds.

---
# aap-service-ca — injected by the OpenShift service CA operator.
# policy-aap-cert-bundle reads: .data["service-ca.crt"]
apiVersion: v1
kind: ConfigMap
metadata:
  name: aap-service-ca
  namespace: ansible-automation-platform
data:
  service-ca.crt: |
    -----BEGIN CERTIFICATE-----
    MIIFakeServiceCAForCITestingOnly==
    -----END CERTIFICATE-----
---
# aap-trusted-ca — injected by the cluster trusted CA bundle operator.
# policy-aap-cert-bundle reads: .data["ca-bundle.crt"]
apiVersion: v1
kind: ConfigMap
metadata:
  name: aap-trusted-ca
  namespace: ansible-automation-platform
data:
  ca-bundle.crt: |
    -----BEGIN CERTIFICATE-----
    MIIFakeTrustedCAForCITestingOnly==
    -----END CERTIFICATE-----
